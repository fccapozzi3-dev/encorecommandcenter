<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OilTrackPro CRM + Invoice Final</title>
  <style>
    :root{
      --bg:#07101d;
      --bg2:#0c1a31;
      --card:#13213a;
      --card2:#162742;
      --border:#2a4470;
      --text:#eef4ff;
      --muted:#a4b7d8;
      --blue:#2b82f6;
      --green:#52d18a;
      --gold:#e7bd53;
      --red:#f07b7b;
      --ink:#111827;
      --soft:#f6f8fb;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;min-height:100%;
      background:linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    }
    .app{max-width:1280px;margin:0 auto;padding:16px}
    h1,h2,h3,h4{margin:0 0 12px}
    h1{font-size:30px}
    h2{font-size:22px}
    h3{font-size:17px}
    .sub{color:var(--muted);margin:0 0 18px}
    .tabs{display:flex;gap:8px;overflow:auto;padding-bottom:8px;margin-bottom:16px}
    .tab,button,.btn,a.btn{
      border:1px solid var(--border);
      background:var(--card2);
      color:var(--text);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      min-height:44px;
      white-space:nowrap;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .tab.active{background:var(--blue)}
    .btn-blue{background:var(--blue);color:#fff}
    .btn-green{background:var(--green);color:#062012}
    .btn-gold{background:var(--gold);color:#241a00}
    .btn-red{background:var(--red);color:#2a0909}
    .btn-soft{background:#213657}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .grid{display:grid;gap:12px}
    .grid-2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
    .grid-3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
    .grid-4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
    .screen.hidden{display:none !important}
    .card{
      background:rgba(19,33,58,.98);
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px;
      margin-bottom:12px;
    }
    input,select,textarea{
      width:100%;
      background:#0d1730;
      color:var(--text);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      margin:0 0 10px;
      font-size:15px;
    }
    textarea{min-height:96px;resize:vertical}
    .metric{font-size:28px;font-weight:800}
    .muted{color:var(--muted)}
    .tiny{font-size:12px;color:var(--muted)}
    .pill{
      display:inline-block;padding:5px 10px;border-radius:999px;border:1px solid var(--border);
      color:var(--muted);font-size:12px;margin-right:6px;margin-bottom:6px
    }
    .pill.hot{color:#ffd9d9;border-color:#7f4343;background:rgba(240,123,123,.08)}
    .pill.good{color:#c8f2d8;border-color:#3c6d52;background:rgba(82,209,138,.08)}
    .pill.warn{color:#ffecb9;border-color:#80682d;background:rgba(231,189,83,.08)}
    .table-wrap{overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
    .divider{height:1px;background:var(--border);margin:12px 0}
    .spacer{height:8px}
    .line-item{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      margin-bottom:10px;
      background:#0d1830;
    }
    .totals{display:grid;gap:8px;max-width:440px;margin-left:auto}
    .total-row{display:flex;justify-content:space-between;gap:16px;border-bottom:1px solid var(--border);padding:8px 0}
    .big-total{font-size:24px;font-weight:800}
    .preview{
      white-space:pre-wrap;background:#0b1426;border:1px solid var(--border);border-radius:14px;padding:14px;font-size:14px
    }
    .kpi{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
    .search{max-width:360px}
    .tag{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:700}
    .tag.lead{background:#3c2d11;color:#ffd57a}
    .tag.followup{background:#2d3245;color:#b9d2ff}
    .tag.ordered{background:#18361f;color:#9ff0b8}
    .tag.delivered{background:#1b3241;color:#8ad7ff}
    .tag.lost{background:#431d25;color:#ffb0c1}
    .tag.customer{background:#243447;color:#d9e5f7}
  </style>
</head>
<body>
<div class="app">
  <h1>OilTrackPro</h1>
  <p class="sub">Lead tracking, order follow-up, commission tracking, customer invoices, and fulfillment invoices for Phoebe.</p>

  <div class="tabs">
    <button class="tab active" data-tab="dashboard">Dashboard</button>
    <button class="tab" data-tab="accounts">Accounts</button>
    <button class="tab" data-tab="products">Products</button>
    <button class="tab" data-tab="orders">Orders / Invoices</button>
    <button class="tab" data-tab="settings">Settings</button>
    <button class="tab" data-tab="backup">Backup</button>
  </div>

  <section id="dashboard" class="screen"></section>
  <section id="accounts" class="screen hidden"></section>
  <section id="products" class="screen hidden"></section>
  <section id="orders" class="screen hidden"></section>
  <section id="settings" class="screen hidden"></section>
  <section id="backup" class="screen hidden"></section>
</div>

<script>
const STORAGE_KEY = 'oiltrackpro_final_v1';

function uid(){ return Math.random().toString(36).slice(2,10); }
function today(){ return new Date().toISOString().slice(0,10); }
function nowIso(){ return new Date().toISOString(); }
function n(v){ return Number(v || 0); }
function currency(v){ return '$' + n(v).toFixed(2); }
function clone(v){ return JSON.parse(JSON.stringify(v)); }
function esc(v){
  return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
}
function attr(v){
  return String(v ?? '').replaceAll('&','&amp;').replaceAll('"','&quot;').replaceAll('<','&lt;').replaceAll('>','&gt;');
}
function statusTag(status){
  const label = status === 'follow_up' ? 'FOLLOW UP' : String(status || '').replaceAll('_',' ').toUpperCase();
  const cls = status === 'lead' ? 'lead' :
              status === 'follow_up' ? 'followup' :
              status === 'ordered' ? 'ordered' :
              status === 'delivered' ? 'delivered' :
              status === 'lost' ? 'lost' : 'customer';
  return '<span class="tag '+cls+'">'+esc(label)+'</span>';
}
function fmtDate(v){ return v || ''; }
function plusDays(startDate, days){
  const d = startDate ? new Date(startDate + 'T12:00:00') : new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}
function parseDate(v){
  if(!v) return null;
  const d = new Date(v + 'T12:00:00');
  return isNaN(d.getTime()) ? null : d;
}
function isTodayOrPast(v){
  const d = parseDate(v);
  if(!d) return false;
  const t = parseDate(today());
  return d.getTime() <= t.getTime();
}

const defaults = {
  accounts: [],
  products: [],
  orders: [],
  settings: {
    companyName: 'Encore Petroleum, LLC',
    companyPhone: '(201) 339-6100',
    companyEmail: 'contact@encorepetroleum.com',
    salesContact: 'Frank Capozzi',
    salesEmail: 'frankhasoil@gmail.com',
    companyAddress: '180 W 5th Street, Bayonne, NJ 07002',
    logoUrl: '',
    paymentTerms: 'Due at delivery / prepaid card',
    invoicePrefix: 'INV-',
    nextInvoiceNumber: 1001,
    phoebeName: 'Phoebe',
    phoebeEmail: '',
    defaultDeliveryCharge: 6.95,
    defaultDrumDeposit: 0,
    defaultTaxRate: 0,
    commissionRate: 10,
    reorderDaysDefault: 21,
    defaultDisclaimer: 'All prices subject to change due to volatile petroleum market conditions.',
    customerEmailMessage: 'Attached is your invoice from Encore Petroleum. Please review and keep this for your records.',
    fulfillmentEmailMessage: 'Attached is the fulfillment copy for processing and delivery scheduling.'
  }
};

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return clone(defaults);
    const parsed = JSON.parse(raw);
    return {
      accounts: Array.isArray(parsed.accounts) ? parsed.accounts : [],
      products: Array.isArray(parsed.products) ? parsed.products : [],
      orders: Array.isArray(parsed.orders) ? parsed.orders : [],
      settings: {...clone(defaults.settings), ...(parsed.settings || {})}
    };
  }catch(e){
    return clone(defaults);
  }
}
let state = loadState();

let ui = {
  tab: 'dashboard',
  accountSearch: '',
  orderSearch: '',
  productSearch: '',
  accountDraft: null,
  productDraft: null,
  orderDraft: null
};

function newAccountDraft(){
  return {
    id: '',
    shopName: '',
    contactName: '',
    phone: '',
    email: '',
    address: '',
    status: 'lead',
    firstTouchDate: today(),
    nextFollowUpDate: plusDays(today(), 3),
    lastOrderDate: '',
    lastDeliveryDate: '',
    nextReorderFollowUpDate: '',
    notes: '',
    tags: ''
  };
}
function newProductDraft(){
  return { id:'', name:'', unit:'gallon', price:0, category:'', sku:'', active:true, notes:'' };
}
function newLineItem(){
  return { id:uid(), productId:'', description:'', quantity:1, unit:'gallon', unitPrice:0 };
}
function newOrderDraft(){
  return {
    id:'',
    invoiceNumber: (state.settings.invoicePrefix || '') + state.settings.nextInvoiceNumber,
    accountId:'',
    customerName:'',
    contactName:'',
    phone:'',
    email:'',
    address:'',
    orderDate: today(),
    expectedDeliveryDate:'',
    deliveryDate:'',
    reorderFollowUpDate:'',
    paymentTerms: state.settings.paymentTerms || '',
    deliveryCharge: n(state.settings.defaultDeliveryCharge),
    drumDeposit: n(state.settings.defaultDrumDeposit),
    taxRate: n(state.settings.defaultTaxRate),
    notes:'Thank you for your business.',
    internalNotes:'',
    fulfillmentNotes:'',
    totalForCommission: 0,
    status:'ordered',
    items:[newLineItem()]
  };
}
ui.accountDraft = newAccountDraft();
ui.productDraft = newProductDraft();
ui.orderDraft = newOrderDraft();

function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function switchTab(tab){
  ui.tab = tab;
  document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
  document.getElementById(tab).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
  render();
}

document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

function metricCard(title, value, note=''){
  return `
    <div class="card">
      <div class="muted">${esc(title)}</div>
      <div class="metric">${value}</div>
      ${note ? `<div class="tiny">${esc(note)}</div>` : ''}
    </div>
  `;
}

function orderTotals(order){
  const subtotal = (order.items || []).reduce((sum, item) => sum + (n(item.quantity) * n(item.unitPrice)), 0);
  const delivery = n(order.deliveryCharge);
  const deposit = n(order.drumDeposit);
  const preTax = subtotal + delivery + deposit;
  const tax = preTax * (n(order.taxRate) / 100);
  const total = preTax + tax;
  const commissionBase = n(order.totalForCommission) || total;
  const commission = commissionBase * (n(state.settings.commissionRate) / 100);
  return { subtotal, delivery, deposit, preTax, tax, total, commissionBase, commission };
}

function getAccount(id){ return state.accounts.find(x => x.id === id); }
function getOrder(id){ return state.orders.find(x => x.id === id); }
function getProduct(id){ return state.products.find(x => x.id === id); }

function renderDashboard(){
  const leadCount = state.accounts.filter(a => a.status === 'lead' || a.status === 'follow_up').length;
  const customerCount = state.accounts.filter(a => ['customer','ordered','delivered'].includes(a.status)).length;
  const followUpsDue = state.accounts.filter(a => a.nextFollowUpDate && isTodayOrPast(a.nextFollowUpDate)).length;
  const reorderDue = state.orders.filter(o => o.reorderFollowUpDate && !o.deliveryDate ? false : (o.reorderFollowUpDate && isTodayOrPast(o.reorderFollowUpDate))).length;
  const totalSales = state.orders.reduce((sum,o)=>sum + n(o.total),0);
  const totalCommission = state.orders.reduce((sum,o)=>sum + n(o.commission),0);

  const followUpRows = state.accounts
    .filter(a => a.nextFollowUpDate && isTodayOrPast(a.nextFollowUpDate))
    .slice(0,8)
    .map(a => `<tr><td>${esc(a.shopName)}</td><td>${statusTag(a.status)}</td><td>${fmtDate(a.nextFollowUpDate)}</td><td>${esc(a.contactName || '')}</td></tr>`)
    .join('');

  const reorderRows = state.orders
    .filter(o => o.reorderFollowUpDate && isTodayOrPast(o.reorderFollowUpDate))
    .slice(0,8)
    .map(o => `<tr><td>${esc(o.customerName)}</td><td>${esc(o.invoiceNumber)}</td><td>${fmtDate(o.reorderFollowUpDate)}</td><td>${currency(o.total)}</td></tr>`)
    .join('');

  document.getElementById('dashboard').innerHTML = `
    <div class="kpi">
      ${metricCard('Open Leads / Follow Ups', leadCount)}
      ${metricCard('Active Customers', customerCount)}
      ${metricCard('Follow Ups Due', followUpsDue)}
      ${metricCard('Reorder Follow Ups Due', reorderDue)}
      ${metricCard('Recorded Sales', currency(totalSales))}
      ${metricCard('Estimated Commission', currency(totalCommission), (state.settings.commissionRate || 0) + '% rate')}
    </div>

    <div class="grid grid-2">
      <div class="card">
        <h2>Workflow</h2>
        <div class="row">
          <span class="pill">New account intake</span>
          <span class="pill">Lead follow-up</span>
          <span class="pill">Order capture</span>
          <span class="pill">Delivery follow-up</span>
          <span class="pill">Reorder reminder</span>
          <span class="pill">Customer PDF</span>
          <span class="pill">Phoebe fulfillment PDF</span>
        </div>
        <div class="spacer"></div>
        <div class="row">
          <button class="btn-blue" onclick="switchTab('accounts')">Add Account</button>
          <button class="btn-blue" onclick="switchTab('orders')">Write Invoice</button>
          <button class="btn-blue" onclick="switchTab('settings')">Set Phoebe Email</button>
        </div>
      </div>

      <div class="card">
        <h2>Most recent order</h2>
        ${state.orders[0] ? `
          <div><strong>${esc(state.orders[0].invoiceNumber)}</strong></div>
          <div class="muted">${esc(state.orders[0].customerName)}</div>
          <div class="muted">Order: ${fmtDate(state.orders[0].orderDate)}${state.orders[0].deliveryDate ? ' • Delivered: ' + fmtDate(state.orders[0].deliveryDate) : ''}</div>
          <div class="big-total">${currency(state.orders[0].total)}</div>
        ` : `<div class="muted">No saved orders yet.</div>`}
      </div>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <h2>Follow ups due now</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Account</th><th>Status</th><th>Follow Up Date</th><th>Contact</th></tr></thead>
            <tbody>${followUpRows || `<tr><td colspan="4" class="muted">Nothing due today.</td></tr>`}</tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <h2>Reorder reminders due now</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Customer</th><th>Invoice #</th><th>Reorder Date</th><th>Total</th></tr></thead>
            <tbody>${reorderRows || `<tr><td colspan="4" class="muted">No reorder reminders due.</td></tr>`}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function renderAccounts(){
  const search = ui.accountSearch.trim().toLowerCase();
  const filtered = state.accounts.filter(a => {
    const blob = [a.shopName,a.contactName,a.phone,a.email,a.address,a.notes,a.tags].join(' ').toLowerCase();
    return !search || blob.includes(search);
  });

  const rows = filtered.map(a => `
    <tr>
      <td>${esc(a.shopName)}</td>
      <td>${statusTag(a.status)}</td>
      <td>${esc(a.contactName || '')}</td>
      <td>${esc(a.phone || '')}</td>
      <td>${fmtDate(a.nextFollowUpDate)}</td>
      <td>${fmtDate(a.nextReorderFollowUpDate)}</td>
      <td>
        <button onclick="editAccount('${a.id}')">Edit</button>
        <button onclick="startOrderFromAccount('${a.id}')">Order</button>
        <button class="btn-red" onclick="deleteAccount('${a.id}')">Delete</button>
      </td>
    </tr>
  `).join('');

  const a = ui.accountDraft;
  document.getElementById('accounts').innerHTML = `
    <div class="grid grid-2">
      <div class="card">
        <h2>Account Intake / Follow-Up</h2>
        <input value="${attr(a.shopName)}" placeholder="Shop / Company Name" oninput="setAccountField('shopName', this.value)" />
        <div class="grid grid-2">
          <input value="${attr(a.contactName)}" placeholder="Contact Name" oninput="setAccountField('contactName', this.value)" />
          <select onchange="setAccountField('status', this.value)">
            ${['lead','follow_up','customer','ordered','delivered','lost'].map(s => `<option value="${s}" ${a.status===s?'selected':''}>${s.replaceAll('_',' ')}</option>`).join('')}
          </select>
        </div>
        <div class="grid grid-2">
          <input value="${attr(a.phone)}" placeholder="Phone" oninput="setAccountField('phone', this.value)" />
          <input value="${attr(a.email)}" placeholder="Email" oninput="setAccountField('email', this.value)" />
        </div>
        <input value="${attr(a.address)}" placeholder="Address" oninput="setAccountField('address', this.value)" />
        <div class="grid grid-3">
          <div>
            <div class="tiny">First touch</div>
            <input type="date" value="${attr(a.firstTouchDate)}" oninput="setAccountField('firstTouchDate', this.value)" />
          </div>
          <div>
            <div class="tiny">Next follow-up</div>
            <input type="date" value="${attr(a.nextFollowUpDate)}" oninput="setAccountField('nextFollowUpDate', this.value)" />
          </div>
          <div>
            <div class="tiny">Reorder reminder</div>
            <input type="date" value="${attr(a.nextReorderFollowUpDate)}" oninput="setAccountField('nextReorderFollowUpDate', this.value)" />
          </div>
        </div>
        <div class="grid grid-2">
          <div>
            <div class="tiny">Last order date</div>
            <input type="date" value="${attr(a.lastOrderDate)}" oninput="setAccountField('lastOrderDate', this.value)" />
          </div>
          <div>
            <div class="tiny">Last delivery date</div>
            <input type="date" value="${attr(a.lastDeliveryDate)}" oninput="setAccountField('lastDeliveryDate', this.value)" />
          </div>
        </div>
        <input value="${attr(a.tags)}" placeholder="Tags (comma separated)" oninput="setAccountField('tags', this.value)" />
        <textarea placeholder="Account notes / touchpoint notes / objections / anything important" oninput="setAccountField('notes', this.value)">${esc(a.notes)}</textarea>

        <div class="row">
          <button class="btn-green" onclick="saveAccount()">Save Account</button>
          <button onclick="resetAccountDraft()">Clear</button>
          <button class="btn-blue" onclick="startOrderFromDraftAccount()">Write Order</button>
        </div>
      </div>

      <div class="card">
        <h2>What this is for</h2>
        <div class="muted">Use this tab when you touch a shop for the first time, do not close on the spot, or need to come back in a few days. When the account buys, click <strong>Write Order</strong> and the order form pulls their info in.</div>
        <div class="spacer"></div>
        <div class="row">
          <span class="pill">First touch logged</span>
          <span class="pill">Next follow-up date</span>
          <span class="pill">Order / delivery history</span>
          <span class="pill">Reorder reminder</span>
          <span class="pill">Account notes</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <input class="search" value="${attr(ui.accountSearch)}" placeholder="Search accounts" oninput="ui.accountSearch=this.value; renderAccounts();" />
        <div class="right tiny">${filtered.length} account(s)</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Account</th><th>Status</th><th>Contact</th><th>Phone</th><th>Next Follow-Up</th><th>Reorder</th><th>Actions</th></tr>
          </thead>
          <tbody>${rows || `<tr><td colspan="7" class="muted">No accounts yet.</td></tr>`}</tbody>
        </table>
      </div>
    </div>
  `;
}

function renderProducts(){
  const search = ui.productSearch.trim().toLowerCase();
  const filtered = state.products.filter(p => {
    const blob = [p.name,p.category,p.sku,p.notes,p.unit].join(' ').toLowerCase();
    return !search || blob.includes(search);
  });

  const rows = filtered.map(p => `
    <tr>
      <td>${esc(p.name)}</td>
      <td>${esc(p.category || '')}</td>
      <td>${esc(p.unit || '')}</td>
      <td>${currency(p.price)}</td>
      <td>${esc(p.sku || '')}</td>
      <td>${p.active === false ? 'Inactive' : 'Active'}</td>
      <td>
        <button onclick="editProduct('${p.id}')">Edit</button>
        <button class="btn-red" onclick="deleteProduct('${p.id}')">Delete</button>
      </td>
    </tr>
  `).join('');

  const p = ui.productDraft;
  document.getElementById('products').innerHTML = `
    <div class="grid grid-2">
      <div class="card">
        <h2>Products</h2>
        <input value="${attr(p.name)}" placeholder="Product name" oninput="setProductField('name', this.value)" />
        <div class="grid grid-2">
          <input value="${attr(p.category)}" placeholder="Category" oninput="setProductField('category', this.value)" />
          <input value="${attr(p.sku)}" placeholder="SKU" oninput="setProductField('sku', this.value)" />
        </div>
        <div class="grid grid-3">
          <input value="${attr(p.unit)}" placeholder="Unit" oninput="setProductField('unit', this.value)" />
          <input type="number" step="0.01" value="${attr(p.price)}" placeholder="Price" oninput="setProductField('price', this.value)" />
          <select onchange="setProductField('active', this.value === 'true')">
            <option value="true" ${p.active !== false ? 'selected' : ''}>Active</option>
            <option value="false" ${p.active === false ? 'selected' : ''}>Inactive</option>
          </select>
        </div>
        <textarea placeholder="Notes" oninput="setProductField('notes', this.value)">${esc(p.notes || '')}</textarea>
        <div class="row">
          <button class="btn-green" onclick="saveProduct()">Save Product</button>
          <button onclick="resetProductDraft()">Clear</button>
          <button class="btn-gold" onclick="seedProducts()">Load Starter Products</button>
        </div>
      </div>
      <div class="card">

function buildOrderPreview(order){
  const totals = orderTotals(order);
  const lines = [];
  lines.push(state.settings.companyName || '');
  lines.push('Invoice #: ' + (order.invoiceNumber || ''));
  lines.push('Order Date: ' + (order.orderDate || ''));
  if(order.expectedDeliveryDate) lines.push('Expected Delivery: ' + order.expectedDeliveryDate);
  if(order.deliveryDate) lines.push('Delivered: ' + order.deliveryDate);
  if(order.reorderFollowUpDate) lines.push('Reorder Follow-Up: ' + order.reorderFollowUpDate);
  lines.push('');
  lines.push('Bill To:');
  lines.push(order.customerName || '');
  if(order.contactName) lines.push(order.contactName);
  if(order.phone) lines.push(order.phone);
  if(order.email) lines.push(order.email);
  if(order.address) lines.push(order.address);
  lines.push('');
  lines.push('Items:');
  (order.items || []).forEach(item => {
    const lineTotal = n(item.quantity) * n(item.unitPrice);
    lines.push('- ' + (item.description || 'Item') + ' | ' + item.quantity + ' ' + (item.unit || '') + ' @ ' + currency(item.unitPrice) + ' = ' + currency(lineTotal));
  });
  lines.push('');
  lines.push('Subtotal: ' + currency(totals.subtotal));
  if(n(order.deliveryCharge)) lines.push('Delivery: ' + currency(order.deliveryCharge));
  if(n(order.drumDeposit)) lines.push('Drum Deposit: ' + currency(order.drumDeposit));
  if(n(order.taxRate)) lines.push('Tax (' + order.taxRate + '%): ' + currency(totals.tax));
  lines.push('Total: ' + currency(totals.total));
  lines.push('Commission Base: ' + currency(totals.commissionBase));
  lines.push('Estimated Commission: ' + currency(totals.commission));
  if(order.notes){ lines.push(''); lines.push(order.notes); }
  if(order.internalNotes){ lines.push(''); lines.push('Internal Notes: ' + order.internalNotes); }
  return lines.join('\n');
}

function saveAccount(){
  const draft = clone(ui.accountDraft);
  if(!draft.shopName) return alert('Enter a shop name.');
  draft.id = draft.id || uid();
  const idx = state.accounts.findIndex(x => x.id === draft.id);
  if(idx >= 0) state.accounts[idx] = draft; else state.accounts.unshift(draft);
  saveState();
  ui.accountDraft = newAccountDraft();
  render();
}
function editAccount(id){
  const a = getAccount(id); if(!a) return;
  ui.accountDraft = clone(a);
  switchTab('accounts');
}
function deleteAccount(id){
  if(!confirm('Delete this account?')) return;
  state.accounts = state.accounts.filter(x => x.id !== id);
  saveState(); render();
}
function startOrderFromDraftAccount(){
  if(!ui.accountDraft.shopName){
    return alert('Enter at least the account/shop name first.');
  }
  if(!ui.accountDraft.id){
    const temp = clone(ui.accountDraft);
    temp.id = uid();
    state.accounts.unshift(temp);
    saveState();
    ui.accountDraft = clone(temp);
  }
  startOrderFromAccount(ui.accountDraft.id);
}
function startOrderFromAccount(id){
  const a = getAccount(id);
  if(!a) return;
  ui.orderDraft = newOrderDraft();
  ui.orderDraft.accountId = a.id;
  ui.orderDraft.customerName = a.shopName || '';
  ui.orderDraft.contactName = a.contactName || '';
  ui.orderDraft.phone = a.phone || '';
  ui.orderDraft.email = a.email || '';
  ui.orderDraft.address = a.address || '';
  ui.orderDraft.reorderFollowUpDate = a.nextReorderFollowUpDate || plusDays(today(), n(state.settings.reorderDaysDefault) || 21);
  switchTab('orders');
}

function loadAccountIntoOrder(id){
  const a = getAccount(id);

    ui.orderDraft.contactName = a.contactName || '';

function removeOrderLine(id){
  if(ui.orderDraft.items.length === 1) return alert('At least one line item is required.');
  ui.orderDraft.items = ui.orderDraft.items.filter(x => x.id !== id);

  if(!line || !p) return;
  line.productId = p.id;
  line.description = p.name || '';
  line.unit = p.unit || '';
  line.unitPrice = n(p.price);
  renderOrders();
}

function saveOrder(){
  const o = clone(ui.orderDraft);
  if(!o.customerName) return alert('Enter a customer name.');
  if(!(o.items || []).length) return alert('Add at least one line item.');
  const totals = orderTotals(o);
  o.id = o.id || uid();
  o.invoiceNumber = o.invoiceNumber || ((state.settings.invoicePrefix || '') + state.settings.nextInvoiceNumber);
  o.subtotal = totals.subtotal;
  o.tax = totals.tax;
  o.total = totals.total;
  o.commissionBase = totals.commissionBase;
  o.commission = totals.commission;
  o.updatedAt = nowIso();
  if(!o.createdAt) o.createdAt = nowIso();

  const idx = state.orders.findIndex(x => x.id === o.id);
  const isNew = idx < 0;
  if(idx >= 0) state.orders[idx] = o; else state.orders.unshift(o);

  if(isNew){
    state.settings.nextInvoiceNumber = n(state.settings.nextInvoiceNumber) + 1;
  }

  if(o.accountId){
    const a = getAccount(o.accountId);
    if(a){
      a.status = o.deliveryDate ? 'delivered' : 'ordered';
      a.lastOrderDate = o.orderDate || a.lastOrderDate;
      a.lastDeliveryDate = o.deliveryDate || a.lastDeliveryDate;
      a.nextReorderFollowUpDate = o.reorderFollowUpDate || a.nextReorderFollowUpDate;
    }
  }

  saveState();
  ui.orderDraft = newOrderDraft();
  render();
  alert('Order saved.');
}

function loadOrder(id){
  const o = getOrder(id);
  if(!o) return;
  ui.orderDraft = clone(o);
  switchTab('orders');
}
function deleteOrder(id){
  if(!confirm('Delete this saved order?')) return;
  state.orders = state.orders.filter(x => x.id !== id);
  saveState(); render();
}

        <div><strong>Email:</strong> ${esc(order.email || '')}</div>
        <div><strong>Expected Delivery:</strong> ${esc(order.expectedDeliveryDate || '')}</div>
        <div><strong>Recorded Delivery Date:</strong> ${esc(order.deliveryDate || '')}</div>
        <div><strong>Reorder Follow-Up:</strong> ${esc(order.reorderFollowUpDate || '')}</div>
        <div><strong>Commission Base:</strong> ${currency(totals.commissionBase)}</div>
        <div><strong>Estimated Commission:</strong> ${currency(totals.commission)}</div>
      </div>
      ${order.internalNotes ? `<div class="muted" style="margin-top:12px;"><strong>Internal Notes:</strong><br>${esc(order.internalNotes)}</div>` : ''}
    </div>
  `;

  return `

    </head>
    <body>
      <div class="wrap">
        <div class="top">
          <div class="brand">
            ${s.logoUrl ? `<img class="logo" src="${esc(s.logoUrl)}" alt="Logo" />` : ''}
            <div style="font-size:24px;font-weight:800;margin-bottom:8px;">${esc(s.companyName || '')}</div>
            <div class="company">${esc(s.companyAddress || '')}
Phone: ${esc(s.companyPhone || '')}
Office Email: ${esc(s.companyEmail || '')}
Sales Contact: ${esc(s.salesContact || '')}
Sales Email: ${esc(s.salesEmail || '')}</div>

function openPrintableWindow(html){
  const win = window.open('', '_blank');
  if(!win){ alert('Pop-up blocked. Please allow pop-ups for this site.'); return; }
  win.document.open(); win.document.write(html); win.document.close();
  setTimeout(() => { win.focus(); win.print(); }, 500);
}
function getDraftWithComputedInvoice(){
  const o = clone(ui.orderDraft);
  if(!o.invoiceNumber){
    o.invoiceNumber = (state.settings.invoicePrefix || '') + state.settings.nextInvoiceNumber;
  }
  return o;
}
function printCustomerPdf(){
  openPrintableWindow(buildInvoiceHtml(getDraftWithComputedInvoice(), 'customer'));
}
function printFulfillmentPdf(){
  openPrintableWindow(buildInvoiceHtml(getDraftWithComputedInvoice(), 'fulfillment'));
}
function printCustomerPdfById(id){
  const o = getOrder(id); if(!o) return;
  openPrintableWindow(buildInvoiceHtml(o, 'customer'));
}
function printFulfillmentPdfById(id){
  const o = getOrder(id); if(!o) return;
  openPrintableWindow(buildInvoiceHtml(o, 'fulfillment'));
}
function openMailto(to, subject, body){
  window.location.href = 'mailto:' + encodeURIComponent(to || '') + '?subject=' + encodeURIComponent(subject || '') + '&body=' + encodeURIComponent(body || '');
}
function emailCustomer(){
  const o = getDraftWithComputedInvoice();
  printCustomerPdf();
  openMailto(o.email || '', 'Invoice ' + o.invoiceNumber + ' - ' + (o.customerName || state.settings.companyName || ''), state.settings.customerEmailMessage || '');
}
function emailPhoebe(){
  const o = getDraftWithComputedInvoice();
  printFulfillmentPdf();
  const to = state.settings.phoebeEmail || '';
  openMailto(to, 'Fulfillment Copy ' + o.invoiceNumber + ' - ' + (o.customerName || ''), state.settings.fulfillmentEmailMessage || '');
}
function emailCustomerById(id){
  const o = getOrder(id); if(!o) return;
  printCustomerPdfById(id);
  openMailto(o.email || '', 'Invoice ' + o.invoiceNumber + ' - ' + (o.customerName || state.settings.companyName || ''), state.settings.customerEmailMessage || '');
}
function emailPhoebeById(id){
  const o = getOrder(id); if(!o) return;
  printFulfillmentPdfById(id);
  openMailto(state.settings.phoebeEmail || '', 'Fulfillment Copy ' + o.invoiceNumber + ' - ' + (o.customerName || ''), state.settings.fulfillmentEmailMessage || '');
}

/* Settings */
function saveSettings(){
  const ids = [
    'companyName','companyPhone','companyEmail','companyAddress','salesContact','salesEmail','logoUrl',
    'invoicePrefix','nextInvoiceNumber','paymentTerms','defaultDeliveryCharge','defaultDrumDeposit',
    'defaultTaxRate','reorderDaysDefault','commissionRate','phoebeEmail','phoebeName',
    'defaultDisclaimer','customerEmailMessage','fulfillmentEmailMessage'
  ];
  ids.forEach(k => {
    const el = document.getElementById('set_' + k);
    if(!el) return;
    state.settings[k] = ['nextInvoiceNumber','defaultDeliveryCharge','defaultDrumDeposit','defaultTaxRate','reorderDaysDefault','commissionRate'].includes(k) ? n(el.value) : el.value.trim();
  });
  saveState();
  render();
  alert('Settings saved.');
}

/* Backup */
function exportBackup(){
  document.getElementById('backup_out').value = JSON.stringify(state, null, 2);
}
function importBackup(){
  const raw = document.getElementById('backup_in').value.trim();
  if(!raw) return alert('Paste backup JSON first.');
  try{
    const parsed = JSON.parse(raw);
    state = {
      accounts: Array.isArray(parsed.accounts) ? parsed.accounts : [],
      products: Array.isArray(parsed.products) ? parsed.products : [],
      orders: Array.isArray(parsed.orders) ? parsed.orders : [],
      settings: {...clone(defaults.settings), ...(parsed.settings || {})}
    };
    saveState();
    ui.accountDraft = newAccountDraft();
    ui.productDraft = newProductDraft();
    ui.orderDraft = newOrderDraft();
    render();
    alert('Backup imported.');
  }catch(e){
    alert('Invalid JSON.');
  }
}
function wipeAll(){
  if(!confirm('Wipe all app data?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = clone(defaults);
  ui.accountDraft = newAccountDraft();
  ui.productDraft = newProductDraft();
  ui.orderDraft = newOrderDraft();
  render();
}

render();
switchTab('dashboard');
</script>
