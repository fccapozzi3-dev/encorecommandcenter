<style>
:root{
  --bg:#0a0d12; --surface:#111520; --surface2:#181d2a; --card:#13192a;
  --border:#1e2840; --border2:#26334f;
  --gold:#e8c84a; --gold2:#f5d96a; --gold-dim:rgba(232,200,74,.12);
  --green:#3fb87a; --red:#f07b7b; --orange:#ff9a3c; --blue:#4ab8ff;
  --text:#e8edf8; --muted:#5a6880; --muted2:#8899b0;
  --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif; --display:'Bebas Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;min-height:100vh}

/* ── TOPBAR ── */
.topbar{
  background:var(--surface);border-bottom:2px solid var(--gold);
  padding:12px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.logo{font-family:var(--display);font-size:26px;letter-spacing:2px;color:var(--gold)}
.logo span{color:var(--muted);font-size:16px;letter-spacing:1px}
.topbar-right{display:flex;align-items:center;gap:20px}
.date-disp{font-family:var(--mono);font-size:11px;color:var(--muted)}
.comm-badge{background:var(--gold-dim);border:1px solid rgba(232,200,74,.3);color:var(--gold2);font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:4px}

/* ── TABS ── */
.tabs{
  background:var(--surface);border-bottom:1px solid var(--border2);
  display:flex;gap:4px;padding:0 20px;overflow-x:auto;
}
.tab{
  border:none;background:transparent;color:var(--muted2);
  font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  padding:13px 16px;cursor:pointer;border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;white-space:nowrap;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── SCREENS ── */
.screen{display:none;padding:24px;flex:1}
.screen.active{display:block}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
.card-title{font-family:var(--display);font-size:18px;letter-spacing:1.5px;color:var(--gold2);margin-bottom:14px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}

/* ── INPUTS ── */
input,select,textarea{
  width:100%;background:#0d1424;color:var(--text);
  border:1px solid var(--border2);border-radius:8px;
  padding:10px 12px;margin-bottom:8px;font-size:14px;font-family:var(--sans);
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}
textarea{min-height:80px;resize:vertical}
.field-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:3px}

/* ── BUTTONS ── */
button,.btn{
  border:1px solid var(--border2);background:var(--surface2);color:var(--text);
  border-radius:8px;padding:10px 16px;font-size:13px;font-family:var(--sans);
  font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;
}
button:hover,.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-gold{background:var(--gold);color:#0a0d12;border-color:var(--gold);font-weight:700}
.btn-gold:hover{background:var(--gold2);color:#0a0d12}
.btn-green{background:rgba(63,184,122,.15);border-color:var(--green);color:var(--green)}
.btn-green:hover{background:rgba(63,184,122,.25)}
.btn-blue{background:rgba(74,184,255,.12);border-color:var(--blue);color:var(--blue)}
.btn-blue:hover{background:rgba(74,184,255,.22)}
.btn-red{background:rgba(240,123,123,.1);border-color:var(--red);color:var(--red)}
.btn-red:hover{background:rgba(240,123,123,.2)}
.btn-sm{padding:5px 10px;font-size:11px}

/* ── TABLES ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 10px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--muted);border-bottom:1px solid var(--border2);text-transform:uppercase;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top}
tr:hover td{background:rgba(255,255,255,.02)}

/* ── TAGS / PILLS ── */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid}
.tag-lead{background:rgba(255,154,60,.1);color:var(--orange);border-color:rgba(255,154,60,.3)}
.tag-follow_up,.tag-followup{background:rgba(74,184,255,.1);color:var(--blue);border-color:rgba(74,184,255,.3)}
.tag-ordered,.tag-customer{background:rgba(63,184,122,.1);color:var(--green);border-color:rgba(63,184,122,.3)}
.tag-delivered{background:rgba(232,200,74,.1);color:var(--gold);border-color:rgba(232,200,74,.3)}
.tag-lost{background:rgba(240,123,123,.1);color:var(--red);border-color:rgba(240,123,123,.3)}
.pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:11px;border:1px solid var(--border2);color:var(--muted2);margin:3px}

/* ── METRICS ── */
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.metric-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px}
.metric-val{font-family:var(--mono);font-size:24px;color:var(--gold)}
.metric-val.green{color:var(--green)}
.metric-val.red{color:var(--red)}
.metric-val.blue{color:var(--blue)}
.metric-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* ── GOAL BAR ── */
.goal-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.goal-track{background:var(--surface2);border-radius:4px;height:10px;margin:8px 0;overflow:hidden}
.goal-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .5s}
.goal-nums{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px}
.goal-earned{color:var(--green)}
.goal-target{color:var(--muted)}
.goal-gap{color:var(--red);font-size:11px;margin-top:4px}

/* ── TASKS ── */
.group-label{
  font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.15em;
  padding:5px 12px;border-radius:4px;display:inline-block;margin-bottom:8px;margin-top:4px;
}
.gl-fire{background:rgba(240,123,123,.15);color:var(--red)}
.gl-soon{background:rgba(255,154,60,.15);color:var(--orange)}
.gl-pipeline{background:rgba(63,184,122,.1);color:var(--green)}
.gl-cold{background:rgba(90,100,130,.15);color:var(--muted2)}
.task{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:12px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px;
  transition:border-color .15s,transform .1s;
}
.task:hover{border-color:var(--gold);transform:translateX(2px)}
.task.done{opacity:.35}
.task.done .task-name{text-decoration:line-through}
.t-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.t-fire{background:var(--red);box-shadow:0 0 6px var(--red)}
.t-soon{background:var(--orange);box-shadow:0 0 6px var(--orange)}
.t-pipeline{background:var(--green)}
.t-cold{background:var(--muted)}
.task-body{flex:1;min-width:0}
.task-name{font-weight:500;font-size:14px;margin-bottom:2px}
.task-action{font-size:12px;color:var(--muted2)}
.task-phone{font-family:var(--mono);font-size:11px;color:var(--blue)}
.task-tag{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid var(--border2);color:var(--muted);margin-left:6px}
.task-ctrls{display:flex;flex-direction:column;gap:4px;flex-shrink:0}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border2);margin:12px 0}
.spacer{height:10px}
.muted{color:var(--muted2)}
.tiny{font-size:11px;color:var(--muted)}
.right{margin-left:auto}

/* ── LINE ITEMS ── */
.line-item{background:#0c1322;border:1px solid var(--border2);border-radius:8px;padding:12px;margin-bottom:10px}
.totals-block{display:grid;gap:6px;max-width:420px;margin-left:auto;margin-top:14px}
.total-row{display:flex;justify-content:space-between;gap:16px;border-bottom:1px solid var(--border);padding:7px 0;font-size:13px}
.total-row.grand{font-family:var(--mono);font-size:20px;font-weight:700;border-bottom:none}
.total-row.grand span{color:var(--gold2)}
.total-row.comm{color:var(--green)}

/* ── PREVIEW ── */
.preview{white-space:pre-wrap;background:#080d18;border:1px solid var(--border);border-radius:8px;padding:14px;font-size:12px;font-family:var(--mono);color:var(--muted2);max-height:480px;overflow-y:auto}

/* ── CALC ── */
.calc-row{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 16px}
.calc-input{width:140px;margin:0}
.calc-result{font-family:var(--mono);font-size:18px;color:var(--gold);white-space:nowrap}

/* ── BACKUP ── */
.backup-area{background:#080d18;border:1px solid var(--border);border-radius:8px;padding:12px;font-size:11px;font-family:var(--mono);color:var(--muted2);min-height:160px;width:100%;resize:vertical}
</style>
</head>

function loadState(){
  try{
    const raw = localStorage.getItem(SK);
    if(raw){
      const p = JSON.parse(raw);
      return {
        accounts: Array.isArray(p.accounts)?p.accounts:[],
        products: Array.isArray(p.products)?p.products:clone(DEFAULT_PRODUCTS),
        orders: Array.isArray(p.orders)?p.orders:[],
        tasks: Array.isArray(p.tasks)?p.tasks:clone(DEFAULT_TASKS),
        settings:{...clone(DEFAULTS.settings),...(p.settings||{})}
      };
    }
    // Try to migrate from old OilTrackPro key
    const old = localStorage.getItem('oiltrackpro_final_v1');
    if(old){
      const p = JSON.parse(old);
      return {
        accounts: Array.isArray(p.accounts)?p.accounts:[],
        products: Array.isArray(p.products)&&p.products.length?p.products:clone(DEFAULT_PRODUCTS),
        orders: Array.isArray(p.orders)?p.orders:[],
        tasks: clone(DEFAULT_TASKS),
        settings:{...clone(DEFAULTS.settings),...(p.settings||{}),commissionRate:7}
      };
    }
  }catch(e){}
  return {
    accounts:[], products:clone(DEFAULT_PRODUCTS),
    orders:[], tasks:clone(DEFAULT_TASKS),
    settings:clone(DEFAULTS.settings)
  };
}

  const labels={lead:'LEAD',follow_up:'FOLLOW UP',ordered:'ORDERED',delivered:'DELIVERED',lost:'LOST',customer:'CUSTOMER'};
  const cls='tag-'+s;
  return `<span class="tag ${cls}">${labels[s]||s}</span>`;

function orderTotals(o){
  const sub=(o.items||[]).reduce((s,i)=>s+n(i.quantity)*n(i.unitPrice),0);
  const del=n(o.deliveryCharge), dep=n(o.drumDeposit);
  const preTax=sub+del+dep;
  const tax=preTax*(n(o.taxRate)/100);
  const total=preTax+tax;
  const base=n(o.totalForCommission)||total;
  const comm=base*(n(S.settings.commissionRate)/100);
  return{subtotal:sub,delivery:del,deposit:dep,preTax,tax,total,commissionBase:base,commission:comm};
}

// RENDER TASKS
// ══════════════════════════════════════════════════════════════════════════════
const PORD={fire:0,soon:1,pipeline:2,cold:3};
const TAG_LABELS={call:'📞 Call',visit:'🚗 Walk In',email:'✉️ Email',followup:'🔁 Follow Up'};

function renderTasks(){
  const f=ui.taskFilter;
  let visible=S.tasks.filter(t=>{
    if(f==='all') return !t.done;
    if(f==='done') return t.done;
    if(['fire','soon','pipeline','cold'].includes(f)) return t.priority===f&&!t.done;
    if(['call','visit','email','followup'].includes(f)) return t.tag===f&&!t.done;
    return true;
  });
  visible.sort((a,b)=>PORD[a.priority]-PORD[b.priority]);

  const open=S.tasks.filter(t=>!t.done);
  const groups={fire:[],soon:[],pipeline:[],cold:[],done:[]};
  visible.forEach(t=>{ if(t.done) groups.done.push(t); else groups[t.priority].push(t); });

  const gMeta={
    fire:{label:'🔥 ON FIRE — DO TODAY',cls:'fire'},
    soon:{label:'⚡ THIS WEEK',cls:'soon'},
    pipeline:{label:'📈 WARM PIPELINE',cls:'pipeline'},
    cold:{label:'❄️ COLD — BUILD LIST',cls:'cold'},
    done:{label:'✅ COMPLETED',cls:'pipeline'},
  };

  let taskHtml='';
  ['fire','soon','pipeline','cold','done'].forEach(g=>{
    if(!groups[g].length) return;
    const m=gMeta[g];
    taskHtml+=`<div><span class="group-label gl-${g}">${m.label}</span>`;
    groups[g].forEach(t=>{
      taskHtml+=`<div class="task${t.done?' done':''}">
        <div class="t-dot t-${t.done?'cold':t.priority}"></div>
        <div class="task-body">
          <div class="task-name">${esc(t.name)} <span class="task-tag">${TAG_LABELS[t.tag]||t.tag}</span></div>
          <div class="task-action">${esc(t.action)}</div>
          ${t.phone?`<div style="margin-top:4px"><span class="task-phone">${esc(t.phone)}</span></div>`:''}
        </div>
        <div class="task-ctrls">
          ${t.done
            ?`<button class="btn-sm" onclick="toggleTask(${t.id})">↩ Undo</button>`
            :`<button class="btn-sm btn-green" onclick="toggleTask(${t.id})">✓ Done</button>`}
          <button class="btn-sm btn-red" onclick="deleteTask(${t.id})">✕</button>
        </div>
      </div>`;
    });
    taskHtml+='</div>';
  });

  const ftags=[
    {f:'all',l:`All (${open.length})`},{f:'fire',l:`🔥 Fire (${open.filter(t=>t.priority==='fire').length})`},
    {f:'soon',l:`⚡ Soon (${open.filter(t=>t.priority==='soon').length})`},
    {f:'pipeline',l:`📈 Pipeline`},{f:'cold',l:`❄️ Cold`},
    {f:'call',l:'📞 Calls'},{f:'visit',l:'🚗 Walk-ins'},
    {f:'email',l:'✉️ Emails'},{f:'followup',l:'🔁 Follow-ups'},{f:'done',l:'✅ Done'},
  ].map(x=>`<button class="btn btn-sm ${ui.taskFilter===x.f?'btn-gold':''}" onclick="setTaskFilter('${x.f}')">${x.l}</button>`).join('');

  document.getElementById('tasks').innerHTML=`
    <div class="g2">
      <div class="card">
        <div class="card-title">Add Task</div>
        <input id="tName" placeholder="Account / shop name" />
        <input id="tAction" placeholder="Action — what to do" />
        <input id="tPhone" placeholder="Phone (optional)" />
        <div class="g2">
          <select id="tPriority">
            <option value="fire">🔥 On Fire</option>
            <option value="soon">⚡ This Week</option>
            <option value="pipeline" selected>📈 Pipeline</option>
            <option value="cold">❄️ Cold</option>
          </select>
          <select id="tTag">
            <option value="call">📞 Call</option>
            <option value="visit">🚗 Walk In</option>
            <option value="email">✉️ Email</option>
            <option value="followup">🔁 Follow Up</option>
          </select>
        </div>
        <button class="btn-gold" onclick="addTask()" style="width:100%">+ Add Task</button>
      </div>
      <div class="card">
        <div class="card-title">Weekly Goal</div>
        <div class="goal-track"><div class="goal-fill" id="tGoalFill" style="width:${Math.min(100,(parseFloat(localStorage.getItem(WEEK_KEY)||0)/3500)*100)}%"></div></div>
        <div class="goal-nums">
          <span class="goal-earned" onclick="updateWeekEarnings()" style="cursor:pointer">$${parseFloat(localStorage.getItem(WEEK_KEY)||0).toFixed(0)} earned ✎</span>
          <span class="goal-target">$3,500</span>
        </div>
        <div class="goal-gap" style="margin-top:6px">${(3500-parseFloat(localStorage.getItem(WEEK_KEY)||0))>0?'$'+(3500-parseFloat(localStorage.getItem(WEEK_KEY)||0)).toFixed(0)+' to go':'✅ GOAL HIT!'}</div>
      </div>
    </div>

    <div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:14px">${ftags}</div>

    <div id="taskList">${taskHtml||'<div style="text-align:center;padding:40px;color:var(--muted);font-family:var(--mono)">No tasks. Add one above.</div>'}</div>
  `;
}

function setTaskFilter(f){ ui.taskFilter=f; renderTasks(); }
function toggleTask(id){ const t=S.tasks.find(x=>x.id===id); if(t){t.done=!t.done;t.doneAt=t.done?Date.now():null;} saveState();renderTasks(); }
function deleteTask(id){ if(!confirm('Delete this task?'))return; S.tasks=S.tasks.filter(t=>t.id!==id); saveState();renderTasks(); }
function addTask(){
  const name=document.getElementById('tName').value.trim();
  if(!name){document.getElementById('tName').focus();return;}
  S.tasks.unshift({
    id:ui.taskNextId++, name, action:document.getElementById('tAction').value.trim()||'Follow up',
    phone:document.getElementById('tPhone').value.trim(),
    priority:document.getElementById('tPriority').value,
    tag:document.getElementById('tTag').value,
    done:false,created:Date.now()
  });
  document.getElementById('tName').value='';
  document.getElementById('tAction').value='';
  document.getElementById('tPhone').value='';
  saveState();renderTasks();
}

function saveAccount(){
  const a=ui.accountDraft;

function startOrderFromAccount(id){const a=S.accounts.find(x=>x.id===id);if(!a)return;ui.orderDraft=newOrderDraft();ui.orderDraft.accountId=a.id;ui.orderDraft.customerName=a.shopName;ui.orderDraft.contactName=a.contactName||'';ui.orderDraft.phone=a.phone||'';ui.orderDraft.email=a.email||'';ui.orderDraft.address=a.address||'';switchTab('orders');}
function startOrderFromDraftAccount(){const a=ui.accountDraft;ui.orderDraft=newOrderDraft();ui.orderDraft.customerName=a.shopName;ui.orderDraft.contactName=a.contactName||'';ui.orderDraft.phone=a.phone||'';ui.orderDraft.email=a.email||'';ui.orderDraft.address=a.address||'';switchTab('orders');}

function renderProducts(){
  const q=ui.productSearch.trim().toLowerCase();
  const filtered=S.products.filter(p=>[p.name,p.category,p.sku,p.notes,p.unit].join(' ').toLowerCase().includes(q));
  const rows=filtered.map(p=>`
    <tr>
      <td><strong>${esc(p.name)}</strong></td>
      <td>${esc(p.category||'')}</td>
      <td>${esc(p.unit||'')}</td>
      <td style="font-family:var(--mono);color:var(--green)">${currency(p.price)}</td>
      <td style="color:var(--gold);font-family:var(--mono);font-size:11px">${currency(p.price*0.07)}</td>
      <td style="font-size:11px;color:var(--muted2)">${esc(p.notes||'')}</td>
      <td>
        <button class="btn-sm" onclick="editProduct('${p.id}')">Edit</button>
        <button class="btn-sm btn-red" onclick="deleteProduct('${p.id}')">✕</button>
      </td>
    </tr>`).join('');

  const p=ui.productDraft;
  document.getElementById('products').innerHTML=`
    <div class="g2">
      <div class="card">
        <div class="card-title">${p.id?'Edit Product':'Add Product'}</div>
        <input value="${attr(p.name)}" placeholder="Product name *" oninput="setPF('name',this.value)"/>
        <div class="g2">
          <input value="${attr(p.category)}" placeholder="Category" oninput="setPF('category',this.value)"/>
          <input value="${attr(p.sku)}" placeholder="SKU" oninput="setPF('sku',this.value)"/>
        </div>
        <div class="g2">
          <input value="${attr(p.unit)}" placeholder="Unit (Drum, Case…)" oninput="setPF('unit',this.value)"/>
          <input type="number" step="0.01" value="${attr(p.price)}" placeholder="Price" oninput="setPF('price',this.value)"/>
        </div>
        <textarea placeholder="Notes" oninput="setPF('notes',this.value)">${esc(p.notes||'')}</textarea>
        <div class="row">
          <button class="btn-green" onclick="saveProduct()">Save Product</button>
          <button onclick="ui.productDraft=newProductDraft();renderProducts()">Clear</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Product Catalog (${filtered.length})</div>
        <input value="${attr(ui.productSearch)}" placeholder="Search products…" oninput="ui.productSearch=this.value;renderProducts()" style="max-width:300px"/>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Name</th><th>Category</th><th>Unit</th><th>Price</th><th>Your 7%</th><th>Notes</th><th></th></tr></thead>
            <tbody>${rows||`<tr><td colspan="7" class="muted">No products.</td></tr>`}</tbody>
          </table>
        </div>
      </div>
    </div>`;
}
function setPF(k,v){ui.productDraft[k]=v;}
function saveProduct(){
  const p=ui.productDraft;
  if(!p.name.trim())return alert('Product name required.');
  p.id=p.id||uid(); p.price=n(p.price); p.active=true;
  const idx=S.products.findIndex(x=>x.id===p.id);
  if(idx>=0) S.products[idx]=clone(p); else S.products.unshift(clone(p));
  saveState();ui.productDraft=newProductDraft();renderProducts();
}
function editProduct(id){const p=S.products.find(x=>x.id===id);if(p){ui.productDraft=clone(p);renderProducts();}}
function deleteProduct(id){if(!confirm('Delete product?'))return;S.products=S.products.filter(x=>x.id!==id);saveState();renderProducts();}

function buildOrderPreview(o){
  const t=orderTotals(o);
  const lines=[S.settings.companyName,'Invoice #: '+(o.invoiceNumber||''),'Date: '+(o.orderDate||''),''];
  lines.push('Bill To: '+(o.customerName||''));
  if(o.contactName) lines.push(o.contactName);
  if(o.phone) lines.push(o.phone);
  if(o.address) lines.push(o.address);
  lines.push('');
  (o.items||[]).forEach(i=>{
    const lt=n(i.quantity)*n(i.unitPrice);
    lines.push(`${i.description||'Item'} | ${i.quantity} ${i.unit||''} @ ${currency(i.unitPrice)} = ${currency(lt)}`);
  });
  lines.push('');
  lines.push('Subtotal: '+currency(t.subtotal));
  if(n(o.deliveryCharge)) lines.push('Delivery: '+currency(o.deliveryCharge));
  if(n(o.drumDeposit)) lines.push('Drum Deposit: '+currency(o.drumDeposit));
  lines.push('TOTAL: '+currency(t.total));
  lines.push('Commission ('+S.settings.commissionRate+'%): '+currency(t.commission));
  return lines.join('\n');
}

function refreshOrderLive(){
  const o=ui.orderDraft, t=orderTotals(o);
  const p=document.getElementById('orderPreview');
  if(p) p.textContent=buildOrderPreview(o);
  [['ot_sub',currency(t.subtotal)],['ot_del',currency(t.delivery)],['ot_dep',currency(t.deposit)],
   ['ot_tax',currency(t.tax)],['ot_tot',currency(t.total)],['ot_cb',currency(t.commissionBase)],['ot_comm',currency(t.commission)]
  ].forEach(([id,v])=>{const el=document.getElementById(id);if(el)el.textContent=v;});
  (o.items||[]).forEach(item=>{
    const el=document.getElementById('lt_'+item.id);
    if(el) el.value=currency(n(item.quantity)*n(item.unitPrice));
  });
}

  const o=ui.orderDraft, t=orderTotals(o);

    .concat(S.accounts.map(a=>`<option value="${a.id}" ${o.accountId===a.id?'selected':''}>${esc(a.shopName)}${a.contactName?' — '+esc(a.contactName):''}</option>`)).join('');
  function prodOpts(selId=''){
    return ['<option value="">Pick product…</option>']
      .concat(S.products.filter(p=>p.active!==false).map(p=>`<option value="${p.id}" ${selId===p.id?'selected':''}>${esc(p.name)} — ${currency(p.price)}/${esc(p.unit||'')}</option>`)).join('');

        </div>
        <div class="g2">
          <input value="${attr(o.phone)}" placeholder="Phone" oninput="setOF('phone',this.value)"/>
          <input value="${attr(o.email)}" placeholder="Email" oninput="setOF('email',this.value)"/>

          <div><div class="field-label">Invoice #</div><input disabled value="${attr(o.invoiceNumber)}"/></div>

          <div><div class="field-label">Expected Delivery</div><input type="date" value="${attr(o.expectedDeliveryDate)}" oninput="setOF('expectedDeliveryDate',this.value)"/></div>

          <div><div class="field-label">Status</div>
            <select onchange="setOF('status',this.value)">
              ${['ordered','delivered','follow_up','customer'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${s.replaceAll('_',' ')}</option>`).join('')}
            </select>
          </div>
          <div><div class="field-label">Payment Terms</div><input value="${attr(o.paymentTerms)}" oninput="setOF('paymentTerms',this.value)"/></div>
        </div>

        <div class="divider"></div>

        <div class="row">

        <div class="preview" id="orderPreview">${esc(buildOrderPreview(o))}</div>

          <div class="card-title" style="font-size:14px">Saved Orders</div>
          <input value="${attr(ui.orderSearch)}" placeholder="Search orders…" oninput="ui.orderSearch=this.value;renderOrders()" style="max-width:300px"/>

            <table>
              <thead><tr><th>Invoice #</th><th>Customer</th><th>Order Date</th><th>Delivered</th><th>Reorder</th><th>Total</th><th>Comm</th><th>Actions</th></tr></thead>
              <tbody>${savedRows||`<tr><td colspan="8" class="muted">No saved orders yet.</td></tr>`}</tbody>
            </table>

    </div>`;
}

function setOF(k,v){
  ui.orderDraft[k]=['deliveryCharge','drumDeposit','taxRate','totalForCommission'].includes(k)?n(v):v;
  refreshOrderLive();
}
function setOLF(id,k,v){
  const l=ui.orderDraft.items.find(x=>x.id===id);
  if(l){ l[k]=['quantity','unitPrice'].includes(k)?n(v):v; refreshOrderLive(); }
}
function setOLP(id,pid){
  const l=ui.orderDraft.items.find(x=>x.id===id);
  const p=getProduct(pid);
  if(!l||!p) return;
  l.productId=p.id; l.description=p.name; l.unit=p.unit; l.unitPrice=n(p.price);
  renderOrders();
}
function addOL(){ ui.orderDraft.items.push(newLineItem()); renderOrders(); }
function removeOL(id){ ui.orderDraft.items=ui.orderDraft.items.filter(x=>x.id!==id); renderOrders(); }
function loadAcctIntoOrder(id){
  const a=getAccount(id); if(!a) return;
  ui.orderDraft.accountId=a.id; ui.orderDraft.customerName=a.shopName;
  ui.orderDraft.contactName=a.contactName||''; ui.orderDraft.phone=a.phone||'';
  ui.orderDraft.email=a.email||''; ui.orderDraft.address=a.address||'';
  renderOrders();
}
function saveOrder(){
  const o=clone(ui.orderDraft);
  if(!o.customerName.trim()) return alert('Customer name required.');
  if(!(o.items||[]).length) return alert('Add at least one line item.');
  const t=orderTotals(o);
  o.id=o.id||uid();
  o.invoiceNumber=o.invoiceNumber||(S.settings.invoicePrefix+S.settings.nextInvoiceNumber);
  Object.assign(o,{subtotal:t.subtotal,tax:t.tax,total:t.total,commissionBase:t.commissionBase,commission:t.commission,updatedAt:nowIso()});
  if(!o.createdAt) o.createdAt=nowIso();
  const idx=S.orders.findIndex(x=>x.id===o.id);
  const isNew=idx<0;
  if(idx>=0) S.orders[idx]=o; else S.orders.unshift(o);
  if(isNew) S.settings.nextInvoiceNumber=n(S.settings.nextInvoiceNumber)+1;
  if(o.accountId){
    const a=getAccount(o.accountId);
    if(a){ a.status=o.deliveryDate?'delivered':'ordered'; a.lastOrderDate=o.orderDate||a.lastOrderDate; a.lastDeliveryDate=o.deliveryDate||a.lastDeliveryDate; a.nextReorderFollowUpDate=o.reorderFollowUpDate||a.nextReorderFollowUpDate; }
  }
  saveState(); ui.orderDraft=newOrderDraft(); renderOrders(); alert('Order saved!');
}
function loadOrder(id){ const o=getOrder(id); if(o){ ui.orderDraft=clone(o); switchTab('orders'); } }
function deleteOrder(id){ if(!confirm('Delete this order?'))return; S.orders=S.orders.filter(x=>x.id!==id); saveState(); renderOrders(); }

    .watermark{

      font-size:88px;font-weight:900;color:rgba(26,58,110,0.055);
      white-space:nowrap;pointer-events:none;z-index:0;letter-spacing:6px;
      font-family:'Segoe UI',Arial,sans-serif;
      user-select:none;
    }

    /* HEADER */
    .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0;padding-bottom:0}
    .logo-block img{max-height:80px;max-width:220px}
    .title-block{text-align:right}
    .invoice-title{font-size:36px;font-weight:900;color:#1a3a6e;letter-spacing:3px;margin-bottom:6px}
    .fulfillment-title{font-size:36px;font-weight:900;color:#b85c00;letter-spacing:3px;margin-bottom:6px}
    .inv-meta div{font-size:13px;color:#444;margin-bottom:3px}
    .inv-meta strong{color:#1a1f2e}

    /* GOLD DIVIDER */
    .gold-bar{height:4px;background:linear-gradient(90deg,#1a3a6e,#b8943a,#1a3a6e);margin:16px 0;border-radius:2px}
    .thin-bar{height:1px;background:#d1dae8;margin:14px 0}

    /* GRID */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
    .sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-top:10px;font-size:13px}

    /* BOXES */
    .box{border:1px solid #d1dae8;border-radius:10px;padding:16px 18px;margin-bottom:16px;position:relative;z-index:1;background:#fff}
    .box-blue{border-left:4px solid #1a3a6e}
    .sec-title{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#1a3a6e;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #e2e8f0}
    .bill-name{font-size:16px;font-weight:700;color:#1a3a6e;margin-bottom:4px}
    .bill-detail{font-size:13px;color:#444;margin-bottom:3px}

    /* TABLE */
    .tbl-wrap{overflow:auto;border-radius:8px;border:1px solid #d1dae8;margin-bottom:0}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead tr{background:linear-gradient(135deg,#1a3a6e,#2a55a0)}
    th{padding:11px 10px;color:#fff;font-weight:700;font-size:11px;letter-spacing:.07em;text-transform:uppercase;text-align:left}
    td{padding:10px 10px;border-bottom:1px solid #e8eef5;vertical-align:middle;font-size:13px}
    tbody tr:last-child td{border-bottom:none}

    /* TOTALS */
    .totals-wrap{display:flex;justify-content:flex-end;margin-top:14px}
    .totals-inner{min-width:320px;border:1px solid #d1dae8;border-radius:10px;overflow:hidden}
    .total-row{display:flex;justify-content:space-between;padding:9px 16px;font-size:13px;border-bottom:1px solid #e8eef5}
    .total-row:last-child{border-bottom:none}
    .total-row.grand{background:linear-gradient(135deg,#1a3a6e,#2a55a0);color:#fff;font-size:18px;font-weight:800;padding:14px 16px}
    .total-row.grand span,.total-row.grand strong{color:#fff}

    /* FOOTER */
    .footer{margin-top:28px;padding-top:14px;border-top:3px solid #b8943a;display:flex;justify-content:space-between;align-items:flex-end;font-size:11px;color:#666}
    .footer-brand{font-size:14px;font-weight:800;color:#1a3a6e;letter-spacing:1px}
    .footer-tag{font-size:10px;color:#b8943a;letter-spacing:2px;text-transform:uppercase;margin-top:2px}

    ul{margin:8px 0 0 18px;padding:0}li{margin:5px 0;font-size:13px;color:#444}
    .note-text{margin-top:10px;color:#555;font-size:13px;font-style:italic}
    @media print{
      body{padding:0}.page{padding:24px 28px}
      .watermark{-webkit-print-color-adjust:exact;print-color-adjust:exact}
      .box,.tbl-wrap,.totals-inner{break-inside:avoid}
      thead tr{-webkit-print-color-adjust:exact;print-color-adjust:exact}
      .total-row.grand{-webkit-print-color-adjust:exact;print-color-adjust:exact}
      .gold-bar{-webkit-print-color-adjust:exact;print-color-adjust:exact}
      .footer{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    }
  </style></head><body>
  <div class="watermark">ENCORE PETROLEUM</div>
  <div class="page">

    <!-- HEADER -->
    <div class="header">
      <div class="logo-block">
        <img src="${LOGO_SRC}" alt="Encore Petroleum"/>
        <div style="font-size:11px;color:#666;margin-top:6px">${esc(s.companyAddress||'')}</div>
        <div style="font-size:11px;color:#666">Ph: ${esc(s.companyPhone||'')} · ${esc(s.companyEmail||'')}</div>
      </div>
      <div class="title-block">
        <div class="${isCustomer?'invoice-title':'fulfillment-title'}">${title}</div>
        <div class="inv-meta">
          <div><strong>Invoice #:</strong> ${esc(order.invoiceNumber||'')}</div>
          <div><strong>Date:</strong> ${esc(order.orderDate||'')}</div>
          ${order.expectedDeliveryDate||order.deliveryDate?`<div><strong>Delivery:</strong> ${esc(order.deliveryDate||order.expectedDeliveryDate||'')}</div>`:''}
          <div><strong>Terms:</strong> ${esc(order.paymentTerms||'')}</div>
          <div style="margin-top:6px"><strong>Account Manager:</strong> ${esc(s.salesContact||'')} — ${esc(s.salesEmail||'')}</div>
          <div style="font-size:12px;color:#444"><strong>Direct:</strong> (732) 614-0711</div>
        </div>
      </div>
    </div>

    <div class="gold-bar"></div>

    <!-- BILL TO + ORDER DETAILS -->
    <div class="two-col">
      <div class="box box-blue">
        <div class="sec-title">Bill To</div>
        <div class="bill-name">${esc(order.customerName||'')}</div>
        ${order.contactName?`<div class="bill-detail">Attn: ${esc(order.contactName)}</div>`:''}
        ${order.address?`<div class="bill-detail">${esc(order.address)}</div>`:''}
        ${order.phone?`<div class="bill-detail">📞 ${esc(order.phone)}</div>`:''}
        ${order.email?`<div class="bill-detail">✉ ${esc(order.email)}</div>`:''}
      </div>
      <div class="box">
        <div class="sec-title">${isCustomer?'Order Details':'Fulfillment Details'}</div>
        <div class="bill-detail"><strong>Order Date:</strong> ${esc(order.orderDate||'')}</div>
        ${order.expectedDeliveryDate?`<div class="bill-detail"><strong>Expected Delivery:</strong> ${esc(order.expectedDeliveryDate)}</div>`:''}
        ${order.deliveryDate?`<div class="bill-detail"><strong>Delivered:</strong> ${esc(order.deliveryDate)}</div>`:''}
        ${!isCustomer&&order.reorderFollowUpDate?`<div class="bill-detail"><strong>Reorder Follow-Up:</strong> ${esc(order.reorderFollowUpDate)}</div>`:''}
        ${!isCustomer?`<div style="margin-top:10px;padding:8px 10px;background:#fff8e1;border-radius:6px;font-weight:700;color:#b85c00;font-size:13px">FULFILLMENT COPY — ${esc(s.phoebeName||'Phoebe')}</div>`:''}
      </div>
    </div>

    <!-- LINE ITEMS TABLE -->
    <div class="box" style="padding:0;overflow:hidden">
      <div style="padding:12px 16px 8px;background:#f8fafc;border-bottom:1px solid #d1dae8">
        <div class="sec-title" style="margin-bottom:0;border-bottom:none">Products &amp; Pricing</div>
      </div>
      <div class="tbl-wrap" style="border:none;border-radius:0">
        <table>
          <thead><tr>
            <th style="width:32px">#</th>
            <th>Description</th>
            <th style="text-align:right;width:60px">Qty</th>
            <th style="width:80px">Unit</th>
            <th style="text-align:right;width:100px">Unit Price</th>
            <th style="text-align:right;width:110px">Line Total</th>
          </tr></thead>
          <tbody>${itemRows}</tbody>
        </table>
      </div>
      <div class="totals-wrap" style="padding:14px 16px">
        <div class="totals-inner">
          <div class="total-row"><span>Subtotal</span><strong>${currency(t.subtotal)}</strong></div>
          ${n(order.deliveryCharge)?`<div class="total-row"><span>Delivery</span><strong>${currency(t.delivery)}</strong></div>`:''}
          ${n(order.drumDeposit)?`<div class="total-row"><span>Drum Deposit</span><strong>${currency(t.deposit)}</strong></div>`:''}
          ${n(order.taxRate)?`<div class="total-row"><span>Tax (${order.taxRate}%)</span><strong>${currency(t.tax)}</strong></div>`:''}
          <div class="total-row grand"><span>TOTAL DUE</span><strong>${currency(t.total)}</strong></div>
        </div>
      </div>
    </div>

    ${extraBox}

    <!-- FOOTER -->
    <div class="footer">
      <div>
        <div class="footer-brand">ENCORE PETROLEUM, LLC</div>
        <div class="footer-tag">Distributors of Fine Lubricants</div>
      </div>
      <div style="text-align:right;color:#888;font-size:11px">
        ${esc(order.invoiceNumber||'')} · ${esc(order.orderDate||'')}
        <br/>Thank you for your business.
      </div>
    </div>

  </div>
  </body></html>`;
}

function openPrint(html){ const w=window.open('','_blank'); if(!w){alert('Allow pop-ups to print.');return;} w.document.open();w.document.write(html);w.document.close();setTimeout(()=>{w.focus();w.print();},500); }
function getDraft(){ const o=clone(ui.orderDraft); if(!o.invoiceNumber) o.invoiceNumber=(S.settings.invoicePrefix||'')+S.settings.nextInvoiceNumber; return o; }
function printCustomerPdf(){ openPrint(buildInvoiceHtml(getDraft(),'customer')); }
function printFulfillmentPdf(){ openPrint(buildInvoiceHtml(getDraft(),'fulfillment')); }
function printCustomerPdfById(id){ const o=getOrder(id);if(o) openPrint(buildInvoiceHtml(o,'customer')); }
function printFulfillmentPdfById(id){ const o=getOrder(id);if(o) openPrint(buildInvoiceHtml(o,'fulfillment')); }
function emailCustomer(){ const o=getDraft(); printCustomerPdf(); window.location.href='mailto:'+encodeURIComponent(o.email||'')+'?subject='+encodeURIComponent('Invoice '+o.invoiceNumber+' — '+(o.customerName||''))+'&body='+encodeURIComponent(S.settings.customerEmailMessage||''); }
function emailPhoebe(){ const o=getDraft(); printFulfillmentPdf(); window.location.href='mailto:'+encodeURIComponent(S.settings.phoebeEmail||'')+'?subject='+encodeURIComponent('Fulfillment Copy '+o.invoiceNumber+' — '+(o.customerName||''))+'&body='+encodeURIComponent(S.settings.fulfillmentEmailMessage||''); }

// ══════════════════════════════════════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════════════════════════════════════
function renderSettings(){
  const s=S.settings;
  document.getElementById('settings').innerHTML=`
    <div class="g2">
      <div class="card">
        <div class="card-title">Company Info</div>
        <input id="s_companyName" value="${attr(s.companyName)}" placeholder="Company Name"/>
        <div class="g2">
          <input id="s_companyPhone" value="${attr(s.companyPhone)}" placeholder="Company Phone"/>
          <input id="s_companyEmail" value="${attr(s.companyEmail)}" placeholder="Company Email"/>
        </div>
        <input id="s_companyAddress" value="${attr(s.companyAddress)}" placeholder="Address"/>
        <div class="g2">
          <input id="s_salesContact" value="${attr(s.salesContact)}" placeholder="Your Name"/>
          <input id="s_salesEmail" value="${attr(s.salesEmail)}" placeholder="Your Email"/>
        </div>
        <div class="g2">
          <input id="s_phoebeName" value="${attr(s.phoebeName)}" placeholder="Phoebe's Name"/>
          <input id="s_phoebeEmail" value="${attr(s.phoebeEmail)}" placeholder="Phoebe's Email"/>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Invoice Defaults</div>
        <div class="g2">
          <input id="s_invoicePrefix" value="${attr(s.invoicePrefix)}" placeholder="Invoice Prefix"/>
          <input id="s_nextInvoiceNumber" type="number" value="${attr(s.nextInvoiceNumber)}" placeholder="Next Invoice #"/>
        </div>
        <input id="s_paymentTerms" value="${attr(s.paymentTerms)}" placeholder="Payment Terms"/>
        <div class="g4">
          <div><div class="field-label">Delivery Charge</div><input id="s_defaultDeliveryCharge" type="number" step="0.01" value="${attr(s.defaultDeliveryCharge)}"/></div>
          <div><div class="field-label">Drum Deposit</div><input id="s_defaultDrumDeposit" type="number" step="0.01" value="${attr(s.defaultDrumDeposit)}"/></div>
          <div><div class="field-label">Tax Rate %</div><input id="s_defaultTaxRate" type="number" step="0.01" value="${attr(s.defaultTaxRate)}"/></div>
          <div><div class="field-label">Reorder Days</div><input id="s_reorderDaysDefault" type="number" value="${attr(s.reorderDaysDefault)}"/></div>
        </div>
        <div><div class="field-label">Commission Rate %</div><input id="s_commissionRate" type="number" step="0.01" value="${attr(s.commissionRate)}"/></div>
        <textarea id="s_defaultDisclaimer" placeholder="Default disclaimer">${esc(s.defaultDisclaimer)}</textarea>
        <textarea id="s_customerEmailMessage" placeholder="Customer email message">${esc(s.customerEmailMessage)}</textarea>
        <textarea id="s_fulfillmentEmailMessage" placeholder="Phoebe email message">${esc(s.fulfillmentEmailMessage)}</textarea>
        <button class="btn-gold" onclick="saveSettings()" style="width:100%;margin-top:6px">Save Settings</button>
      </div>
    </div>`;
}
function saveSettings(){
  const keys=['companyName','companyPhone','companyEmail','companyAddress','salesContact','salesEmail','phoebeName','phoebeEmail','invoicePrefix','nextInvoiceNumber','paymentTerms','defaultDeliveryCharge','defaultDrumDeposit','defaultTaxRate','reorderDaysDefault','commissionRate','defaultDisclaimer','customerEmailMessage','fulfillmentEmailMessage'];
  const numKeys=['nextInvoiceNumber','defaultDeliveryCharge','defaultDrumDeposit','defaultTaxRate','reorderDaysDefault','commissionRate'];
  keys.forEach(k=>{const el=document.getElementById('s_'+k);if(!el)return;S.settings[k]=numKeys.includes(k)?n(el.value):el.value.trim();});
  saveState();render();alert('Settings saved.');
}

// ══════════════════════════════════════════════════════════════════════════════
// BACKUP
// ══════════════════════════════════════════════════════════════════════════════
function renderBackup(){
  document.getElementById('backup').innerHTML=`
    <div class="g2">
      <div class="card">
        <div class="card-title">Export Backup</div>
        <p class="muted" style="margin-bottom:10px">Click Export to generate your full data backup. Copy and save it somewhere safe.</p>
        <button class="btn-green" onclick="doExport()">Export All Data</button>
        <textarea class="backup-area" id="exportOut" readonly placeholder="Click Export to generate…"></textarea>
      </div>
      <div class="card">
        <div class="card-title">Import Backup</div>
        <p class="muted" style="margin-bottom:10px">Paste a previously exported backup and click Import to restore.</p>
        <textarea class="backup-area" id="importIn" placeholder="Paste backup JSON here…"></textarea>
        <div class="row" style="margin-top:8px">
          <button class="btn-blue" onclick="doImport()">Import Data</button>
          <button class="btn-red" onclick="doWipe()">Wipe All Data</button>
        </div>
      </div>
    </div>`;
}
function doExport(){ document.getElementById('exportOut').value=JSON.stringify(S,null,2); }
function doImport(){
  const raw=document.getElementById('importIn').value.trim();
  if(!raw) return alert('Paste backup JSON first.');
  try{
    const p=JSON.parse(raw);
    S={accounts:p.accounts||[],products:p.products||clone(DEFAULT_PRODUCTS),orders:p.orders||[],tasks:p.tasks||clone(DEFAULT_TASKS),settings:{...clone(DEFAULTS.settings),...(p.settings||{})}};
    saveState();ui.accountDraft=newAccountDraft();ui.productDraft=newProductDraft();ui.orderDraft=newOrderDraft();
    render();alert('Backup imported successfully.');
  }catch(e){alert('Invalid JSON — check your backup.');}
}
function doWipe(){
  if(!confirm('Wipe ALL data? This cannot be undone.'))return;
  localStorage.removeItem(SK);S={accounts:[],products:clone(DEFAULT_PRODUCTS),orders:[],tasks:clone(DEFAULT_TASKS),settings:clone(DEFAULTS.settings)};
  ui.accountDraft=newAccountDraft();ui.productDraft=newProductDraft();ui.orderDraft=newOrderDraft();
  render();
}

// ══════════════════════════════════════════════════════════════════════════════
// MAIN RENDER + DATE
// ══════════════════════════════════════════════════════════════════════════════
function render(){
  const tab=ui.tab;
  if(tab==='dashboard') renderDashboard();
  else if(tab==='tasks') renderTasks();
  else if(tab==='accounts') renderAccounts();
  else if(tab==='products') renderProducts();
  else if(tab==='orders') renderOrders();
  else if(tab==='settings') renderSettings();
  else if(tab==='backup') renderBackup();
}

function updateDate(){
  const d=new Date();
  document.getElementById('dateDisp').textContent=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
updateDate();
setInterval(updateDate,60000);
render();

// Enter to add task
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.activeElement&&['tName','tAction','tPhone'].includes(document.activeElement.id)) addTask();
});
</script>
</body>
