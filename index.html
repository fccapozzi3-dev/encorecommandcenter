<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OilTrackPro — Settings First</title>
  <style>
    :root{
      --bg:#06101e;
      --bg2:#09172b;
      --card:#101c31;
      --card2:#13223c;
      --border:#27406b;
      --text:#eef4ff;
      --muted:#9db2d8;
      --blue:#1f6fd6;
      --blue2:#2b82f6;
      --green:#52d18a;
      --red:#f07b7b;
      --gold:#e7bd53;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%;background:linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .app{max-width:1200px;margin:0 auto;padding:16px}
    h1,h2,h3{margin:0 0 12px}
    h1{font-size:30px}
    h2{font-size:22px}
    h3{font-size:18px}
    .sub{color:var(--muted);margin:0 0 18px}
    .tabs{display:flex;gap:8px;overflow:auto;padding-bottom:8px;margin-bottom:16px}
    .tab,button,.btn{
      border:1px solid var(--border);
      background:var(--card2);
      color:var(--text);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      min-height:44px;
      white-space:nowrap;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .tab.active{background:var(--blue)}
    .btn-blue{background:var(--blue2);color:#fff}
    .btn-green{background:var(--green);color:#072013}
    .btn-red{background:var(--red);color:#2a0909}
    .btn-gold{background:var(--gold);color:#241a00}
    .grid{display:grid;gap:12px}
    .grid-2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
    .grid-3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
    .card{
      background:rgba(16,28,49,.97);
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px;
      margin-bottom:12px;
    }
    input,select,textarea{
      width:100%;
      background:#0c1730;
      color:var(--text);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      margin:0 0 10px;
      font-size:16px;
    }
    textarea{min-height:96px;resize:vertical}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .stack{display:grid;gap:10px}
    .screen.hidden{display:none!important}
    .metric{font-size:30px;font-weight:800}
    .muted{color:var(--muted)}
    .tiny{font-size:12px;color:var(--muted)}
    .table-wrap{overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
    .pill{
      display:inline-block;
      padding:4px 9px;
      border-radius:999px;
      border:1px solid var(--border);
      color:var(--muted);
      font-size:12px;
      margin-right:6px;
      margin-bottom:6px;
    }
    .list-item{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      background:#0c1730;
    }
    .spacer{height:8px}
    .divider{height:1px;background:var(--border);margin:12px 0}
    .right{margin-left:auto}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .danger-text{color:#ffaaaa}
    .success-text{color:#8ff0b2}
    .link{color:#8dbcff;word-break:break-all}
    .nowrap{white-space:nowrap}
    .line-item{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      margin-bottom:10px;
      background:#0d1830;
    }
    .totals{
      display:grid;
      gap:8px;
      max-width:420px;
      margin-left:auto;
    }
    .total-row{
      display:flex;
      justify-content:space-between;
      gap:16px;
      border-bottom:1px solid var(--border);
      padding:8px 0;
    }
    .big-total{font-size:24px;font-weight:800}
    .preview{
      white-space:pre-wrap;
      background:#0b1426;
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      font-size:14px;
    }
  </style>
</head>
<body>
<div class="app">
  <h1>OilTrackPro</h1>
  <p class="sub">Settings-first oil CRM, quote builder, invoice builder, and product manager.</p>

  <div class="tabs">
    <button class="tab active" data-tab="dashboard">Dashboard</button>
    <button class="tab" data-tab="products">Products</button>
    <button class="tab" data-tab="fields">Customer Fields</button>
    <button class="tab" data-tab="customers">Customers</button>
    <button class="tab" data-tab="invoices">Invoices</button>
    <button class="tab" data-tab="settings">Settings</button>
    <button class="tab" data-tab="data">Backup</button>
  </div>

  <section id="dashboard" class="screen"></section>
  <section id="products" class="screen hidden"></section>
  <section id="fields" class="screen hidden"></section>
  <section id="customers" class="screen hidden"></section>
  <section id="invoices" class="screen hidden"></section>
  <section id="settings" class="screen hidden"></section>
  <section id="data" class="screen hidden"></section>
</div>

<script>
const STORAGE_KEY = 'oiltrackpro_settings_first_v2';

const defaults = {
  products: [],
  customerFields: [
    {id: uid(), key:'shopName', label:'Shop Name', type:'text', required:true, enabled:true, options:''},
    {id: uid(), key:'contactName', label:'Contact Name', type:'text', required:true, enabled:true, options:''},
    {id: uid(), key:'phone', label:'Phone', type:'phone', required:false, enabled:true, options:''},
    {id: uid(), key:'email', label:'Email', type:'email', required:false, enabled:true, options:''},
    {id: uid(), key:'notes', label:'Notes', type:'textarea', required:false, enabled:true, options:''}
  ],
  customers: [],
  invoices: [],
  settings: {
    companyName: 'Encore Petroleum',
    companyPhone: '',
    companyEmail: '',
    companyAddress: '',
    logoUrl: '',
    invoicePrefix: 'INV-',
    nextInvoiceNumber: 1001,
    paymentTerms: 'Due on receipt',
    defaultDeliveryCharge: 0,
    defaultTaxRate: 0,
    defaultDrumDeposit: 0,
    defaultDisclaimer: 'Prices and availability are subject to change based on market conditions and supply volatility.',
    quoteMessage: 'Thank you for the opportunity to quote your lubricants and related products.',
    invoiceMessage: 'Thank you for your business.',
    customerOrderFormUrl: 'https://fccapozzi3-dev.github.io/Sales/customer-order-form.html'
  }
};

let state = loadState();
let ui = {
  tab: 'dashboard',
  invoiceDraft: newInvoiceDraft()
};

function uid(){
  return Math.random().toString(36).slice(2,9);
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return structuredClone(defaults);
    const parsed = JSON.parse(raw);
    return {
      products: Array.isArray(parsed.products) ? parsed.products : structuredClone(defaults.products),
      customerFields: Array.isArray(parsed.customerFields) ? parsed.customerFields : structuredClone(defaults.customerFields),
      customers: Array.isArray(parsed.customers) ? parsed.customers : structuredClone(defaults.customers),
      invoices: Array.isArray(parsed.invoices) ? parsed.invoices : structuredClone(defaults.invoices),
      settings: {...structuredClone(defaults.settings), ...(parsed.settings || {})}
    };
  }catch(e){
    return structuredClone(defaults);
  }
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function structuredClone(obj){
  return JSON.parse(JSON.stringify(obj));
}

function currency(n){
  return '$' + Number(n || 0).toFixed(2);
}

function numberOrZero(v){
  return Number(v || 0);
}

function switchTab(tab){
  ui.tab = tab;
  document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
  document.getElementById(tab).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
  render();
}

function render(){
  renderDashboard();
  renderProducts();
  renderFields();
  renderCustomers();
  renderInvoices();
  renderSettings();
  renderData();
}

function metricCard(title, value, note=''){
  return `
    <div class="card">
      <div class="muted">${title}</div>
      <div class="metric">${value}</div>
      ${note ? `<div class="tiny">${note}</div>` : ''}
    </div>
  `;
}

function renderDashboard(){
  const revenue = state.invoices.reduce((sum, inv) => sum + numberOrZero(inv.total), 0);
  const activeProducts = state.products.filter(p => p.active !== false).length;
  const enabledFields = state.customerFields.filter(f => f.enabled !== false).length;
  const lastInvoice = state.invoices[0];

  document.getElementById('dashboard').innerHTML = `
    <div class="grid grid-3">
      ${metricCard('Products', state.products.length, activeProducts + ' active')}
      ${metricCard('Customers', state.customers.length)}
      ${metricCard('Invoices', state.invoices.length)}
      ${metricCard('Quoted / Invoiced Total', currency(revenue))}
      ${metricCard('Customer Intake Fields', state.customerFields.length, enabledFields + ' enabled')}
      ${metricCard('Next Invoice #', (state.settings.invoicePrefix || '') + state.settings.nextInvoiceNumber)}
    </div>

    <div class="card">
      <h2>What you can edit now</h2>
      <div class="row">
        <span class="pill">Products</span>
        <span class="pill">Pricing</span>
        <span class="pill">Units</span>
        <span class="pill">Customer fields</span>
        <span class="pill">Invoice terms</span>
        <span class="pill">Delivery charge</span>
        <span class="pill">Tax</span>
        <span class="pill">Drum deposit</span>
        <span class="pill">Company info</span>
      </div>
      <div class="spacer"></div>
      <div class="row">
        <button class="btn-blue" onclick="switchTab('products')">Manage Products</button>
        <button class="btn-blue" onclick="switchTab('fields')">Edit Customer Fields</button>
        <button class="btn-blue" onclick="switchTab('invoices')">Build Invoice</button>
      </div>
    </div>

    <div class="card">
      <h2>Customer order form URL</h2>
      <a class="link" href="${escapeHtml(state.settings.customerOrderFormUrl || '')}" target="_blank">${escapeHtml(state.settings.customerOrderFormUrl || 'Not set')}</a>
      <div class="spacer"></div>
      <div class="tiny">Note: this app is settings-driven on this browser. Public customer forms on other devices will not automatically inherit local browser settings without a backend.</div>
    </div>

    <div class="card">
      <h2>Most recent invoice</h2>
      ${lastInvoice ? `
        <div><strong>${escapeHtml(lastInvoice.invoiceNumber)}</strong></div>
        <div class="muted">${escapeHtml(lastInvoice.customerName || 'No customer')}</div>
        <div class="muted">${escapeHtml(lastInvoice.date || '')}</div>
        <div class="big-total">${currency(lastInvoice.total)}</div>
      ` : `<div class="muted">No invoices yet.</div>`}
    </div>
  `;
}

function renderProducts(){
  let rows = '';
  state.products.forEach((p, i) => {
    rows += `
      <tr>
        <td>${escapeHtml(p.name || '')}</td>
        <td>${escapeHtml(p.category || '')}</td>
        <td>${escapeHtml(p.unit || '')}</td>
        <td>${currency(p.price)}</td>
        <td>${escapeHtml(p.sku || '')}</td>
        <td>${p.active === false ? 'Inactive' : 'Active'}</td>
        <td class="nowrap">
          <button onclick="editProduct('${p.id}')">Edit</button>
          <button class="btn-red" onclick="deleteProduct('${p.id}')">Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById('products').innerHTML = `
    <div class="grid grid-2">
      <div class="card">
        <h2>Add / Edit Product</h2>
        <input id="prod_name" placeholder="Product name" />
        <input id="prod_category" placeholder="Category (ex: Full Synthetic, Heavy Duty, Hydraulic, Grease)" />
        <div class="grid grid-2">
          <input id="prod_unit" placeholder="Unit (gal, drum, pail, case, keg)" />
          <input id="prod_price" type="number" step="0.01" placeholder="Price" />
        </div>
        <div class="grid grid-2">
          <input id="prod_sku" placeholder="SKU / short code" />
          <select id="prod_active">
            <option value="true">Active</option>
            <option value="false">Inactive</option>
          </select>
        </div>
        <textarea id="prod_notes" placeholder="Notes"></textarea>
        <input type="hidden" id="prod_id" />
        <div class="row">
          <button class="btn-green" onclick="saveProduct()">Save Product</button>
          <button onclick="clearProductForm()">Clear</button>
          <button class="btn-gold" onclick="seedEncoreStarterProducts()">Load Starter Products</button>
        </div>
      </div>

      <div class="card">
        <h2>How to use products</h2>
        <div class="muted">Add every product once here. The invoice builder will pull from this list and auto-fill price and unit.</div>
        <div class="spacer"></div>
        <div class="tiny">Examples: 0W-20 Full Synthetic, 5W-30 Synthetic Blend, 15W-40 CK-4, AW 32 Hydraulic, Gear Oil 80W90, Red Grease 120 lb keg.</div>
      </div>
    </div>

    <div class="card">
      <h2>Product Catalog</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Category</th>
              <th>Unit</th>
              <th>Price</th>
              <th>SKU</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${rows || `<tr><td colspan="7" class="muted">No products yet.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderFields(){
  let rows = '';
  state.customerFields.forEach(f => {
    rows += `
      <tr>
        <td>${escapeHtml(f.label)}</td>
        <td>${escapeHtml(f.key)}</td>
        <td>${escapeHtml(f.type)}</td>
        <td>${f.required ? 'Yes' : 'No'}</td>
        <td>${f.enabled === false ? 'No' : 'Yes'}</td>
        <td>${escapeHtml(f.options || '')}</td>
        <td>
          <button onclick="editField('${f.id}')">Edit</button>
          <button class="btn-red" onclick="deleteField('${f.id}')">Delete</button>
        </td>
      </tr>
    `;
  });

  const preview = state.customerFields
    .filter(f => f.enabled !== false)
    .map(f => `<div class="pill">${escapeHtml(f.label)}${f.required ? ' *' : ''} — ${escapeHtml(f.type)}</div>`)
    .join('');

  document.getElementById('fields').innerHTML = `
    <div class="grid grid-2">
      <div class="card">
        <h2>Add / Edit Customer Field</h2>
        <input id="field_label" placeholder="Field label (ex: Shop Name)" />
        <input id="field_key" placeholder="Field key (ex: shopName)" />
        <div class="grid grid-2">
          <select id="field_type">
            <option value="text">text</option>
            <option value="phone">phone</option>
            <option value="email">email</option>
            <option value="number">number</option>
            <option value="textarea">textarea</option>
            <option value="dropdown">dropdown</option>
            <option value="checkbox">checkbox</option>
          </select>
          <select id="field_required">
            <option value="true">Required</option>
            <option value="false">Optional</option>
          </select>
        </div>
        <select id="field_enabled">
          <option value="true">Enabled</option>
          <option value="false">Disabled</option>
        </select>
        <textarea id="field_options" placeholder="Dropdown options, comma separated. Example: Drum,Bulk,Case"></textarea>
        <input type="hidden" id="field_id" />
        <div class="row">
          <button class="btn-green" onclick="saveField()">Save Field</button>
          <button onclick="clearFieldForm()">Clear</button>
        </div>
      </div>

      <div class="card">
        <h2>Customer form preview</h2>
        <div>${preview || `<div class="muted">No enabled fields.</div>`}</div>
        <div class="spacer"></div>
        <div class="tiny">This controls what info you want to collect in your workflow. A true public dynamic customer form for everyone will eventually need a backend or form service.</div>
      </div>
    </div>

    <div class="card">
      <h2>Customer Fields</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Label</th>
              <th>Key</th>
              <th>Type</th>
              <th>Required</th>
              <th>Enabled</th>
              <th>Options</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${rows || `<tr><td colspan="7" class="muted">No fields yet.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderCustomers(){
  let rows = '';
  state.customers.forEach(c => {
    rows += `
      <tr>
        <td>${escapeHtml(c.shopName || c.name || '')}</td>
        <td>${escapeHtml(c.contactName || '')}</td>
        <td>${escapeHtml(c.phone || '')}</td>
        <td>${escapeHtml(c.email || '')}</td>
        <td>
          <button onclick="loadCustomerToInvoice('${c.id}')">Use</button>
          <button onclick="editCustomer('${c.id}')">Edit</button>
          <button class="btn-red" onclick="deleteCustomer('${c.id}')">Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById('customers').innerHTML = `
    <div class="grid grid-2">
      <div class="card">
        <h2>Add / Edit Customer</h2>
        <input id="cust_shopName" placeholder="Shop Name" />
        <input id="cust_contactName" placeholder="Contact Name" />
        <div class="grid grid-2">
          <input id="cust_phone" placeholder="Phone" />
          <input id="cust_email" placeholder="Email" />
        </div>
        <input id="cust_address" placeholder="Address" />
        <textarea id="cust_notes" placeholder="Notes"></textarea>
        <input type="hidden" id="cust_id" />
        <div class="row">
          <button class="btn-green" onclick="saveCustomer()">Save Customer</button>
          <button onclick="clearCustomerForm()">Clear</button>
        </div>
      </div>

      <div class="card">
        <h2>Customer records</h2>
        <div class="muted">Use this list to quickly build quotes and invoices without retyping customer information.</div>
      </div>
    </div>

    <div class="card">
      <h2>Customer List</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Shop</th>
              <th>Contact</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${rows || `<tr><td colspan="5" class="muted">No customers yet.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function newInvoiceDraft(){
  return {
    customerId: '',
    customerName: '',
    contactName: '',
    email: '',
    phone: '',
    address: '',
    date: today(),
    dueDate: '',
    deliveryCharge: numberOrZero(state.settings.defaultDeliveryCharge),
    taxRate: numberOrZero(state.settings.defaultTaxRate),
    drumDeposit: numberOrZero(state.settings.defaultDrumDeposit),
    notes: state.settings.invoiceMessage || '',
    disclaimer: state.settings.defaultDisclaimer || '',
    items: [newLineItem()]
  };
}

function newLineItem(){
  return {
    id: uid(),
    productId: '',
    description: '',
    quantity: 1,
    unit: '',
    unitPrice: 0
  };
}

function invoiceTotals(inv){
  const subtotal = inv.items.reduce((sum, item) => sum + (numberOrZero(item.quantity) * numberOrZero(item.unitPrice)), 0);
  const delivery = numberOrZero(inv.deliveryCharge);
  const deposit = numberOrZero(inv.drumDeposit);
  const preTax = subtotal + delivery + deposit;
  const tax = preTax * (numberOrZero(inv.taxRate) / 100);
  const total = preTax + tax;
  return {subtotal, delivery, deposit, preTax, tax, total};
}

function renderInvoices(){
  const inv = ui.invoiceDraft;
  const totals = invoiceTotals(inv);

  let customerOptions = `<option value="">Select customer</option>`;
  state.customers.forEach(c => {
    customerOptions += `<option value="${c.id}" ${inv.customerId === c.id ? 'selected' : ''}>${escapeHtml(c.shopName || '')}</option>`;
  });

  const productOptions = () => {
    let html = `<option value="">Select product</option>`;
    state.products.filter(p => p.active !== false).forEach(p => {
      html += `<option value="${p.id}">${escapeHtml(p.name)} — ${currency(p.price)} / ${escapeHtml(p.unit || '')}</option>`;
    });
    return html;
  };

  const lineItemsHtml = inv.items.map((item, idx) => `
    <div class="line-item">
      <div class="grid grid-2">
        <select onchange="setLineProduct('${item.id}', this.value)">
          ${productOptions()}
        </select>
        <input value="${escapeAttr(item.description || '')}" placeholder="Description" oninput="setLineField('${item.id}', 'description', this.value)" />
      </div>
      <div class="grid grid-3">
        <input type="number" step="0.01" value="${item.quantity}" placeholder="Qty" oninput="setLineField('${item.id}', 'quantity', this.value)" />
        <input value="${escapeAttr(item.unit || '')}" placeholder="Unit" oninput="setLineField('${item.id}', 'unit', this.value)" />
        <input type="number" step="0.01" value="${item.unitPrice}" placeholder="Unit Price" oninput="setLineField('${item.id}', 'unitPrice', this.value)" />
      </div>
      <div class="row">
        <div class="right"><strong>Line Total: ${currency(numberOrZero(item.quantity) * numberOrZero(item.unitPrice))}</strong></div>
        <button class="btn-red" onclick="removeLineItem('${item.id}')">Remove</button>
      </div>
    </div>
  `).join('');

  const previewText = buildInvoiceTextPreview(inv, totals);

  let invoiceRows = '';
  state.invoices.forEach(saved => {
    invoiceRows += `
      <tr>
        <td>${escapeHtml(saved.invoiceNumber)}</td>
        <td>${escapeHtml(saved.customerName || '')}</td>
        <td>${escapeHtml(saved.date || '')}</td>
        <td>${currency(saved.total)}</td>
        <td>
          <button onclick="loadSavedInvoice('${saved.id}')">Load</button>
          <button onclick="copySavedInvoice('${saved.id}')">Copy Text</button>
          <button onclick="emailSavedInvoice('${saved.id}')">Email</button>
          <button class="btn-red" onclick="deleteInvoice('${saved.id}')">Delete</button>
        </td>
      </tr>
    `;
  });

  document.getElementById('invoices').innerHTML = `
    <div class="grid grid-2">
      <div class="card">
        <h2>Invoice Builder</h2>
        <select onchange="loadCustomerToDraft(this.value)">
          ${customerOptions}
        </select>
        <div class="grid grid-2">
          <input value="${escapeAttr(inv.customerName || '')}" placeholder="Customer / Shop Name" oninput="setInvoiceField('customerName', this.value)" />
          <input value="${escapeAttr(inv.contactName || '')}" placeholder="Contact Name" oninput="setInvoiceField('contactName', this.value)" />
        </div>
        <div class="grid grid-2">
          <input value="${escapeAttr(inv.phone || '')}" placeholder="Phone" oninput="setInvoiceField('phone', this.value)" />
          <input value="${escapeAttr(inv.email || '')}" placeholder="Email" oninput="setInvoiceField('email', this.value)" />
        </div>

function escapeHtml(v){
  return String(v ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;');
}

function escapeAttr(v){
  return String(v ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('"','&quot;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;');
}

function today(){
  return new Date().toISOString().slice(0,10);
}

function buildInvoiceTextPreview(inv, totals){
  const invoiceNumber = (state.settings.invoicePrefix || '') + state.settings.nextInvoiceNumber;
  const lines = [];
  lines.push(state.settings.companyName || '');
  if(state.settings.companyPhone) lines.push(state.settings.companyPhone);
  if(state.settings.companyEmail) lines.push(state.settings.companyEmail);
  if(state.settings.companyAddress) lines.push(state.settings.companyAddress);
  lines.push('');
  lines.push('Invoice #: ' + invoiceNumber);
  lines.push('Date: ' + (inv.date || ''));
  if(inv.dueDate) lines.push('Due Date: ' + inv.dueDate);
  lines.push('');
  lines.push('Bill To:');
  lines.push(inv.customerName || '');
  if(inv.contactName) lines.push(inv.contactName);
  if(inv.phone) lines.push(inv.phone);
  if(inv.email) lines.push(inv.email);
  if(inv.address) lines.push(inv.address);
  lines.push('');
  lines.push('Items:');
  inv.items.forEach(item => {
    const lineTotal = numberOrZero(item.quantity) * numberOrZero(item.unitPrice);
    lines.push('- ' + (item.description || 'Item') + ' | ' + item.quantity + ' ' + (item.unit || '') + ' @ ' + currency(item.unitPrice) + ' = ' + currency(lineTotal));
  });
  lines.push('');
  lines.push('Subtotal: ' + currency(totals.subtotal));
  if(numberOrZero(inv.deliveryCharge)) lines.push('Delivery: ' + currency(inv.deliveryCharge));
  if(numberOrZero(inv.drumDeposit)) lines.push('Drum Deposit: ' + currency(inv.drumDeposit));
  if(numberOrZero(inv.taxRate)) lines.push('Tax (' + inv.taxRate + '%): ' + currency(totals.tax));
  lines.push('Total: ' + currency(totals.total));
  lines.push('');
  if(state.settings.paymentTerms) lines.push('Payment Terms: ' + state.settings.paymentTerms);
  if(inv.notes) { lines.push(''); lines.push(inv.notes); }
  if(inv.disclaimer) { lines.push(''); lines.push(inv.disclaimer); }
  return lines.join('\n');
}

function saveInvoice(){
  const inv = ui.invoiceDraft;
  if(!inv.customerName) return alert('Enter a customer name.');
  if(!inv.items.length) return alert('Add at least one line item.');
  const totals = invoiceTotals(inv);
  const saved = {
    id: uid(),
    invoiceNumber: (state.settings.invoicePrefix || '') + state.settings.nextInvoiceNumber,
    date: inv.date || '',
    dueDate: inv.dueDate || '',
    customerId: inv.customerId || '',
    customerName: inv.customerName || '',
    contactName: inv.contactName || '',
    email: inv.email || '',
    phone: inv.phone || '',
    address: inv.address || '',
    items: structuredClone(inv.items),
    deliveryCharge: numberOrZero(inv.deliveryCharge),
    taxRate: numberOrZero(inv.taxRate),
    drumDeposit: numberOrZero(inv.drumDeposit),
    notes: inv.notes || '',
    disclaimer: inv.disclaimer || '',
    subtotal: totals.subtotal,
    tax: totals.tax,
    total: totals.total,
    createdAt: new Date().toISOString()
  };
  state.invoices.unshift(saved);
  state.settings.nextInvoiceNumber = numberOrZero(state.settings.nextInvoiceNumber) + 1;
  saveState();
  alert('Invoice saved.');
  ui.invoiceDraft = newInvoiceDraft();
  render();
}

  state.settings.nextInvoiceNumber = numberOrZero(document.getElementById('set_nextInvoiceNumber').value);
  state.settings.paymentTerms = document.getElementById('set_paymentTerms').value.trim();
  state.settings.defaultDeliveryCharge = numberOrZero(document.getElementById('set_defaultDeliveryCharge').value);
  state.settings.defaultTaxRate = numberOrZero(document.getElementById('set_defaultTaxRate').value);
  state.settings.defaultDrumDeposit = numberOrZero(document.getElementById('set_defaultDrumDeposit').value);
  state.settings.defaultDisclaimer = document.getElementById('set_defaultDisclaimer').value.trim();
  state.settings.quoteMessage = document.getElementById('set_quoteMessage').value.trim();
  state.settings.invoiceMessage = document.getElementById('set_invoiceMessage').value.trim();
  state.settings.customerOrderFormUrl = document.getElementById('set_customerOrderFormUrl').value.trim();
  saveState();
  alert('Settings saved.');
  render();
}

function resetSettingsOnly(){
  if(!confirm('Reset settings only? Products, customers, and invoices will stay.')) return;
  state.settings = structuredClone(defaults.settings);
  saveState();
  render();
}

/* BACKUP */
function exportData(){
  document.getElementById('backup_output').value = JSON.stringify(state, null, 2);
}

function importData(){
  try{
    const raw = document.getElementById('backup_input').value.trim();
    if(!raw) return alert('Paste backup JSON first.');
    const parsed = JSON.parse(raw);
    state = {
      products: Array.isArray(parsed.products) ? parsed.products : [],
      customerFields: Array.isArray(parsed.customerFields) ? parsed.customerFields : structuredClone(defaults.customerFields),
      customers: Array.isArray(parsed.customers) ? parsed.customers : [],
      invoices: Array.isArray(parsed.invoices) ? parsed.invoices : [],
      settings: {...structuredClone(defaults.settings), ...(parsed.settings || {})}
    };
    saveState();
    ui.invoiceDraft = newInvoiceDraft();
    alert('Backup imported.');
    render();
  }catch(e){
    alert('Invalid JSON.');
  }
}

function wipeEverything(){
  if(!confirm('This will erase all products, customers, invoices, fields, and settings on this browser. Continue?')) return;
  state = structuredClone(defaults);
  ui.invoiceDraft = newInvoiceDraft();
  saveState();
  render();
}

/* INIT */
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

render();
</script>
</body>
</html>
