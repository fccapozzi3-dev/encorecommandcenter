<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encore Sales App - Fixed</title>
  <style>
    :root {
      --bg: #07101f;
      --surface: #0f1a2f;
      --surface-2: #14213d;
      --border: #24365f;
      --text: #eef4ff;
      --muted: #9cb0d5;
      --gold: #d9b45a;
      --blue: #0e5ab7;
      --blue-2: #1b75d0;
      --blue-3: #dfeeff;
      --ink: #0f2544;
      --paper: #ffffff;
      --green: #50d890;
      --red: #f27d7d;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, Arial, sans-serif;
      background: linear-gradient(180deg, #050b16 0%, #081120 100%);
      color: var(--text);
    }
    .app { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .card {
      background: rgba(15,26,47,.98);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .grow { flex: 1 1 320px; }
    h1, h2, h3 { margin: 0 0 12px; }
    h1 { font-size: 28px; }
    h2 { font-size: 20px; }
    h3 { font-size: 16px; }
    .muted { color: var(--muted); }
    .tabs { display: flex; gap: 10px; margin: 0 0 20px; flex-wrap: wrap; }
    .tab, button {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    .tab.active { background: var(--blue); color: white; border-color: #0b4e9f; }
    .btn-blue { background: linear-gradient(180deg, var(--blue-2), var(--blue)); color: white; border-color: #0b4e9f; }
    .btn-green { background: var(--green); color: #072013; border-color: #3eb673; }
    .btn-red { background: var(--red); color: #260909; border-color: #d36363; }
    input, select, textarea {
      width: 100%;
      background: #0b1630;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      margin: 0 0 10px;
      font: inherit;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid var(--border); text-align: left; font-size: 14px; vertical-align: top; }
    .pill { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #12213e; border: 1px solid var(--border); font-size: 12px; }
    .stack { display: flex; flex-direction: column; gap: 10px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .preview {
      white-space: pre-wrap;
      background: #081020;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      min-height: 140px;
    }
    .small { font-size: 12px; }
    .hidden { display: none !important; }
    .field-label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
  </style>
</head>
<body>
  <div class="app">
    <h1>Encore Petroleum Sales App</h1>
    <div class="muted" style="margin-bottom: 18px">Offline-safe build. No React, no Babel, no CDN dependency.</div>

    <div class="tabs">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="contacts">Contacts</button>
      <button class="tab" data-tab="quote">Quote</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="dispatch">Dispatch</button>
      <button class="tab" data-tab="settings">Settings</button>
    </div>

    <section id="dashboard" class="screen"></section>
    <section id="contacts" class="screen hidden"></section>
    <section id="quote" class="screen hidden"></section>
    <section id="history" class="screen hidden"></section>
    <section id="dispatch" class="screen hidden"></section>
    <section id="settings" class="screen hidden"></section>
  </div>

<script>
(function () {
  const COMPANY = {
    name: 'Encore Petroleum',
    email: 'contact@encorepetroleum.com',
    phone: '(201) 339-6100',
    rep: {
      name: 'Frank Capozzi',
      title: 'Regional Accounts Manager',
      email: 'frankhasoil@gmail.com',
      phone: '(732) 614-0711'
    }
  };

  const FULFILLMENT = {
    emails: ['phoebe@encorepetroleum.com', 'steve@encorepetroleum.com'],
    phone: '+19176473982'
  };

  const FEES = {
    deliveryFee: 6.95,
    kegDeposit: 20.00
  };

  const DEFAULT_PRODUCTS = [
    'Synthetic 0W-20','Synthetic 5W-20','Synthetic 5W-30','Synthetic 10W-30',
    'Synthetic Blend 5W-20','Synthetic Blend 5W-30','Synthetic Blend 10W-30',
    'Diesel 15W-40','Diesel 5W-40','ATF Dexron VI','ATF Mercon V','Hydraulic ISO 46','Hydraulic ISO 68','Gear Oil 75W-90'
  ];

  const CONTAINERS = [
    { id: 'bulk', label: 'Bulk Fill', gallons: 1 },
    { id: 'drum', label: 'Drum', gallons: 55 },
    { id: 'pail', label: 'Pail', gallons: 5 },
    { id: 'case', label: 'Case (4x1 gal)', gallons: 4 }
  ];

  const state = {
    tab: 'dashboard',
    draftContactId: '',
    selectedQuoteId: '',
    contacts: load('encore_contacts', []),
    quotes: load('encore_quotes', []),
    products: load('encore_products', DEFAULT_PRODUCTS),
    quoteBuilder: {
      editingQuoteId: '',
      contactId: '',
      customerContactName: '',
      deliveryNotes: '',
      includeDeliveryFee: true,
      kegDepositCount: '0',
      product: '',
      containerId: 'drum',
      quantity: '1',
      pricePerGallon: '',
      items: []
    }
  };

  if (!state.products.length) state.products = DEFAULT_PRODUCTS.slice();
  state.quoteBuilder.product = state.products[0] || '';

  function uid() {
    return Math.random().toString(36).slice(2, 9);
  }

  function quoteId() {
    const d = new Date();
    return 'QT-' + d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + '-' + Math.floor(Math.random()*900+100);
  }

  function load(key, fallback) {
    try {
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : fallback;
    } catch (e) {
      return fallback;
    }
  }

  function save() {
    localStorage.setItem('encore_contacts', JSON.stringify(state.contacts));
    localStorage.setItem('encore_quotes', JSON.stringify(state.quotes));
    localStorage.setItem('encore_products', JSON.stringify(state.products));
  }

  function currency(n) {
    return '$' + Number(n || 0).toFixed(2);
  }

  function containerLabel(id) {
    const c = CONTAINERS.find(x => x.id === id);
    return c ? c.label : id;
  }

  function formatDateTime(ts) {
    return new Date(ts).toLocaleDateString();
  }

  function nextDayDate(ts) {
    const d = new Date(ts || Date.now());
    d.setDate(d.getDate() + 1);
    return d.toLocaleDateString();
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function currentQuote() {
    return state.quotes.find(q => q.id === state.selectedQuoteId) || null;
  }

  function currentContactForQuote(quote) {
    if (!quote) return null;
    return state.contacts.find(c => c.id === quote.contactId) || null;
  }

  function quoteFinancials(quote) {
    const itemsSubtotal = (quote.items || []).reduce((sum, i) => sum + Number(i.total || 0), 0);
    const kegDepositCount = Number(quote.kegDepositCount || 0);
    const deliveryFee = quote.includeDeliveryFee === false ? 0 : FEES.deliveryFee;
    const kegDepositTotal = kegDepositCount * FEES.kegDeposit;
    const total = itemsSubtotal + deliveryFee + kegDepositTotal;
    return {
      itemsSubtotal: Number(itemsSubtotal.toFixed(2)),
      deliveryFee: Number(deliveryFee.toFixed(2)),
      kegDepositCount,
      kegDepositTotal: Number(kegDepositTotal.toFixed(2)),
      total: Number(total.toFixed(2))
    };
  }

  function hydrateLegacyQuotes() {
    state.quotes = (state.quotes || []).map(q => {
      const contact = state.contacts.find(c => c.id === q.contactId) || {};
      const merged = {
        customerContactName: q.customerContactName || contact.contactPerson || '',
        deliveryNotes: q.deliveryNotes || '',
        includeDeliveryFee: q.includeDeliveryFee !== false,
        kegDepositCount: String(q.kegDepositCount || '0'),
        ...q
      };
      const f = quoteFinancials(merged);
      merged.itemsSubtotal = f.itemsSubtotal.toFixed(2);
      merged.total = f.total.toFixed(2);
      return merged;
    });
  }

  hydrateLegacyQuotes();

  function switchTab(tab) {
    state.tab = tab;
    document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
    document.getElementById(tab).classList.remove('hidden');
    document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
    render();
  }

  function render() {
    renderDashboard();
    renderContacts();
    renderQuote();
    renderHistory();
    renderDispatch();
    renderSettings();
  }

  function renderDashboard() {
    document.getElementById('dashboard').innerHTML = `
      <div class="row">
        <div class="card grow">
          <h2>Totals</h2>
          <div class="row">
            <div class="card grow"><h3>${state.contacts.length}</h3><div class="muted">Contacts</div></div>
            <div class="card grow"><h3>${state.quotes.length}</h3><div class="muted">Quotes</div></div>
          </div>
        </div>
        <div class="card grow">
          <h2>Quick Actions</h2>
          <div class="actions">
            <button class="btn-blue" onclick="EncoreApp.switchTab('contacts')">Add Contact</button>
            <button class="btn-blue" onclick="EncoreApp.switchTab('quote')">New Quote</button>
            <button onclick="EncoreApp.switchTab('history')">Open History</button>
            <button onclick="EncoreApp.switchTab('settings')">Settings</button>
          </div>
        </div>
      </div>`;
  }

  function renderContacts() {
    const cards = state.contacts.length ? state.contacts.map(c => `
      <div class="card" style="padding:12px">
        <div style="font-weight:800">${escapeHtml(c.name)}</div>
        <div class="small muted">${escapeHtml(c.contactPerson || 'No contact name')}</div>
        <div class="small muted">${escapeHtml(c.phone || 'No phone')}</div>
        <div class="small muted">${escapeHtml(c.email || 'No email')}</div>
        <div class="actions" style="margin-top:10px">
          <button class="btn-blue" onclick="EncoreApp.useContactForQuote('${c.id}')">New Quote</button>
          <button onclick="EncoreApp.editContact('${c.id}')">Edit</button>
          <button class="btn-red" onclick="EncoreApp.deleteContact('${c.id}')">Delete</button>
        </div>
      </div>`).join('') : '<div class="muted">No contacts yet.</div>';

    document.getElementById('contacts').innerHTML = `
      <div class="row">
        <div class="card grow">
          <h2>Add / Edit Contact</h2>
          <input id="contact-id" type="hidden" />
          <input id="contact-name" placeholder="Business name" />
          <input id="contact-person" placeholder="Customer contact name" />
          <input id="contact-phone" placeholder="Phone" />
          <input id="contact-email" placeholder="Email" />
          <input id="contact-address" placeholder="Address" />
          <div class="actions">
            <button class="btn-blue" onclick="EncoreApp.addContact()">Save Contact</button>
            <button onclick="EncoreApp.resetContactForm()">Clear</button>
          </div>
        </div>
        <div class="card grow">
          <h2>Saved Contacts</h2>
          <div class="stack">${cards}</div>
        </div>
      </div>`;
  }

  function renderQuote() {
    const q = state.quoteBuilder;
    if (!state.products.includes(q.product)) q.product = state.products[0] || '';
    if (state.draftContactId) q.contactId = state.draftContactId;
    const selectedContact = state.contacts.find(c => c.id === q.contactId) || null;
    if (!q.customerContactName && selectedContact && selectedContact.contactPerson) q.customerContactName = selectedContact.contactPerson;

    const contactOptions = state.contacts.map(c => `<option value="${c.id}" ${q.contactId === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('');
    const productOptions = state.products.map(p => `<option value="${escapeHtml(p)}" ${q.product === p ? 'selected' : ''}>${escapeHtml(p)}</option>`).join('');
    const containerOptions = CONTAINERS.map(c => `<option value="${c.id}" ${q.containerId === c.id ? 'selected' : ''}>${c.label}</option>`).join('');
    const subtotal = q.items.reduce((sum, i) => sum + Number(i.total), 0);
    const kegDepositCount = Number(q.kegDepositCount || 0);
    const deliveryFee = q.includeDeliveryFee === false ? 0 : FEES.deliveryFee;
    const grandTotal = subtotal + deliveryFee + (kegDepositCount * FEES.kegDeposit);
    const itemsHtml = q.items.length ? `
      <table>
        <thead><tr><th>Product</th><th>Container</th><th>Gallons</th><th>Total</th><th></th></tr></thead>
        <tbody>
          ${q.items.map(i => `<tr>
            <td>${escapeHtml(i.product)}</td>
            <td>${escapeHtml(containerLabel(i.containerId))} x ${i.quantity}</td>
            <td>${i.totalGallons}</td>
            <td>${currency(i.total)}</td>
            <td><button class="btn-red" onclick="EncoreApp.removeQuoteItem('${i.id}')">Remove</button></td>
          </tr>`).join('')}
        </tbody>
      </table>` : '<div class="muted">Nothing added yet.</div>';

    document.getElementById('quote').innerHTML = `
      <div class="row">
        <div class="card grow">
          <h2>${q.editingQuoteId ? 'Edit Invoice / Quote' : 'Build Quote'}</h2>
          <div class="field-label">Customer</div>
          <select id="quote-contact" onchange="EncoreApp.syncContactOnQuote()"><option value="">Select customer</option>${contactOptions}</select>
          <div class="field-label">Customer contact name</div>
          <input id="quote-customer-contact" placeholder="Person receiving invoice / delivery" value="${escapeHtml(q.customerContactName || '')}" />
          <div class="field-label">Delivery notes</div>
          <textarea id="quote-delivery-notes" rows="3" placeholder="Dock instructions, hours, leave with, tank location, etc.">${escapeHtml(q.deliveryNotes || '')}</textarea>
          <div class="row">
            <div class="grow" style="min-width:180px">
              <div class="field-label">Product</div>
              <select id="quote-product">${productOptions}</select>
            </div>
            <div class="grow" style="min-width:180px">
              <div class="field-label">Container</div>
              <select id="quote-container">${containerOptions}</select>
            </div>
          </div>
          <div class="row">
            <div class="grow" style="min-width:140px">
              <div class="field-label">Quantity</div>
              <input id="quote-quantity" type="number" value="${escapeHtml(q.quantity)}" />
            </div>
            <div class="grow" style="min-width:180px">
              <div class="field-label">Price per gallon</div>
              <input id="quote-price" type="number" step="0.01" value="${escapeHtml(q.pricePerGallon)}" />
            </div>
          </div>
          <div class="row" style="align-items:end">
            <label class="grow" style="min-width:220px;display:flex;gap:8px;align-items:center"><input id="quote-delivery-fee" type="checkbox" ${q.includeDeliveryFee === false ? '' : 'checked'} /> Include $${FEES.deliveryFee.toFixed(2)} delivery fee</label>
            <div class="grow" style="min-width:180px">
              <div class="field-label">Keg deposits</div>
              <input id="quote-keg-count" type="number" min="0" step="1" value="${escapeHtml(q.kegDepositCount || '0')}" />
            </div>
          </div>
          <div class="muted small" style="margin:8px 0 14px">Invoices state a $20.00 keg deposit and $6.95 delivery fee.</div>
          <div class="actions">
            <button class="btn-blue" onclick="EncoreApp.addQuoteItem()">Add Line Item</button>
            <button class="btn-blue" onclick="EncoreApp.saveQuote()">${q.editingQuoteId ? 'Update Invoice' : 'Save Quote'}</button>
            <button onclick="EncoreApp.resetQuoteBuilder()">Clear</button>
          </div>
        </div>
        <div class="card grow">
          <h2>Line Items</h2>
          ${itemsHtml}
          <div style="height:16px"></div>
          <div class="card" style="padding:12px;background:#fbfdff">
            <div class="row" style="justify-content:space-between"><div>Products Subtotal</div><div>${currency(subtotal)}</div></div>
            <div class="row" style="justify-content:space-between"><div>Delivery Fee</div><div>${currency(deliveryFee)}</div></div>
            <div class="row" style="justify-content:space-between"><div>Keg Deposit</div><div>${currency(kegDepositCount * FEES.kegDeposit)}</div></div>
            <div class="row" style="justify-content:space-between;font-weight:800"><div>Estimated Total</div><div>${currency(grandTotal)}</div></div>
          </div>
        </div>
      </div>`;
  }

  function renderHistory() {
    const rows = state.quotes.length ? state.quotes.map(q => {
      const contact = currentContactForQuote(q);
      return `<tr>
        <td class="mono">${escapeHtml(q.id)}</td>
        <td>${escapeHtml(contact ? contact.name : 'Unknown')}</td>
        <td>${escapeHtml(q.customerContactName || contact?.contactPerson || '')}</td>
        <td>${escapeHtml(new Date(q.createdAt).toLocaleString())}</td>
        <td>${currency(q.total)}</td>
        <td>
          <div class="actions">
            <button onclick="EncoreApp.editQuote('${q.id}')">Edit</button>
            <button class="btn-blue" onclick="EncoreApp.openDispatch('${q.id}')">Dispatch</button>
            <button onclick="EncoreApp.printQuote('${q.id}')">Print / Save PDF</button>
            <button class="btn-red" onclick="EncoreApp.deleteQuote('${q.id}')">Delete</button>
          </div>
        </td>
      </tr>`;
    }).join('') : '<tr><td colspan="6" class="muted">No quotes yet.</td></tr>';

    document.getElementById('history').innerHTML = `
      <div class="card">
        <h2>Quote History</h2>
        <table>
          <thead><tr><th>ID</th><th>Customer</th><th>Contact</th><th>Date</th><th>Total</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function renderDispatch() {
    const quote = currentQuote();
    const contact = currentContactForQuote(quote);
    if (!quote || !contact) {
      document.getElementById('dispatch').innerHTML = '<div class="card"><h2>Dispatch</h2><div class="muted">Open a saved quote from History first.</div></div>';
      return;
    }

    const f = quoteFinancials(quote);
    const lines = quote.items.map(i => `- ${i.product} | ${containerLabel(i.containerId)} x ${i.quantity} | ${i.totalGallons} gal | ${currency(i.total)}`).join('\n');
    const validity = nextDayDate(quote.createdAt);
    const customerSubject = `Encore Petroleum Quote ${quote.id}`;
    const customerBody = [
      `Hello ${quote.customerContactName || contact.contactPerson || contact.name},`,
      '',
      `Attached is your official Encore Petroleum quote ${quote.id}.`,
      `Quote valid through ${validity}.`,
      `Delivery fee: ${currency(f.deliveryFee)}.`,
      `Keg deposit policy: ${currency(FEES.kegDeposit)} per keg when applicable.`,
      quote.deliveryNotes ? `Delivery notes: ${quote.deliveryNotes}` : '',
      '',
      `If you need any revisions, reply to this email or call ${COMPANY.rep.phone}.`,
      '',
      `${COMPANY.rep.name}`,
      `${COMPANY.rep.title}`,
      `${COMPANY.rep.phone}`,
      `${COMPANY.rep.email}`
    ].filter(Boolean).join('\n');

    const fulfillmentBody = [
      `Official quote package for ${contact.name}.`,
      '',
      `Quote ID: ${quote.id}`,
      `Valid through: ${validity}`,
      `Customer contact: ${quote.customerContactName || contact.contactPerson || 'N/A'}`,
      `Customer phone: ${contact.phone || 'N/A'}`,
      `Customer email: ${contact.email || 'N/A'}`,
      `Address: ${contact.address || 'N/A'}`,
      quote.deliveryNotes ? `Delivery notes: ${quote.deliveryNotes}` : '',
      '',
      `Line items:`,
      lines,
      '',
      `Products subtotal: ${currency(f.itemsSubtotal)}`,
      `Delivery fee: ${currency(f.deliveryFee)}`,
      `Keg deposits: ${f.kegDepositCount} x ${currency(FEES.kegDeposit)} = ${currency(f.kegDepositTotal)}`,
      `Estimated total: ${currency(f.total)}`,
      '',
      `Attach the downloaded PDF when sending.`,
      '',
      `Submitted by ${COMPANY.rep.name}`
    ].filter(Boolean).join('\n');

    const fullQuoteText = [
      `ENCORE PETROLEUM QUOTE ${quote.id}`,
      `Quote Date: ${formatDateTime(quote.createdAt)}`,
      `Valid Through: ${validity}`,
      `Customer: ${contact.name}`,
      `Customer Contact: ${quote.customerContactName || contact.contactPerson || 'N/A'}`,
      `Address: ${contact.address || 'N/A'}`,
      `Contact: ${contact.phone || 'N/A'}${contact.email ? ' | ' + contact.email : ''}`,
      quote.deliveryNotes ? `Delivery Notes: ${quote.deliveryNotes}` : '',
      '',
      `PRODUCTS`,
      lines,
      '',
      `Products Subtotal: ${currency(f.itemsSubtotal)}`,
      `Delivery Fee: ${currency(f.deliveryFee)}`,
      `Keg Deposits: ${f.kegDepositCount} x ${currency(FEES.kegDeposit)} = ${currency(f.kegDepositTotal)}`,
      `Estimated Total: ${currency(f.total)}`,
      `Sales Rep: ${COMPANY.rep.name} | ${COMPANY.rep.phone} | ${COMPANY.rep.email}`
    ].filter(Boolean).join('\n');

    document.getElementById('dispatch').innerHTML = `
      <div class="row">
        <div class="card grow">
          <h2>Dispatch Actions</h2>
          <div class="muted small" style="margin-bottom:10px">This build uses the browser print dialog for PDF generation. That avoids the broken external PDF library dependency.</div>
          <div class="pill">Quote ${escapeHtml(quote.id)}</div>
          <div style="height:12px"></div>
          <div class="actions">
            <button onclick="EncoreApp.printQuote('${quote.id}')">Print / Save PDF</button>
            <button onclick="EncoreApp.editQuote('${quote.id}')">Edit Invoice</button>
            <button class="btn-blue" onclick="EncoreApp.emailCustomer('${quote.id}')">Email Customer Quote</button>
            <button class="btn-green" onclick="EncoreApp.smsCustomer('${quote.id}')">SMS</button>
            <button onclick="EncoreApp.copyText(${JSON.stringify(fullQuoteText)})">Copy Full Quote</button>
          </div>
          <div style="height:16px"></div>
          <div class="actions">
            <button class="btn-blue" onclick="EncoreApp.emailBoth('${quote.id}')">Print + Email Both</button>
            <button onclick="EncoreApp.emailFulfillment('${quote.id}')">Email Fulfillment Quote</button>
            <button onclick="EncoreApp.copyText(${JSON.stringify(fulfillmentBody)})">Copy Fulfillment</button>
          </div>
        </div>
        <div class="card grow">
          <h2>Customer Email Preview</h2>
          <div class="preview">${escapeHtml(customerBody)}</div>
          <div style="height:16px"></div>
          <h2>Fulfillment Email Preview</h2>
          <div class="preview">${escapeHtml(fulfillmentBody)}</div>
        </div>
      </div>`;
  }

  function renderSettings() {
    const productCards = state.products.length ? state.products.map(name => `
      <div class="card" style="padding:12px;display:flex;justify-content:space-between;align-items:center;gap:12px">
        <div style="font-weight:700">${escapeHtml(name)}</div>
        <button class="btn-red" onclick="EncoreApp.removeProduct(${JSON.stringify(name)})">Remove</button>
      </div>`).join('') : '<div class="muted">No products saved yet.</div>';

    document.getElementById('settings').innerHTML = `
      <div class="row">
        <div class="card grow">
          <h2>Settings</h2>
          <div class="muted" style="margin-bottom:14px">Control the products that appear in your quote builder.</div>
          <div class="field-label">Add product</div>
          <input id="new-product" placeholder="Example: Full Synthetic 0W-20 Dexos Gen 3" />
          <div class="actions">
            <button class="btn-blue" onclick="EncoreApp.addProduct()">Add Product</button>
            <button onclick="EncoreApp.resetProducts()">Reset Default List</button>
          </div>
        </div>
        <div class="card grow">
          <h2>Active Products</h2>
          <div class="stack">${productCards}</div>
        </div>
      </div>`;
  }

  function buildQuoteHtml(quote, contact) {
    const f = quoteFinancials(quote);
    const rows = quote.items.map((item, idx) => `
      <tr>
        <td>${idx + 1}</td>
        <td>${escapeHtml(item.product)}</td>
        <td>${escapeHtml(containerLabel(item.containerId))} x ${item.quantity}</td>
        <td style="text-align:right">${item.totalGallons}</td>
        <td style="text-align:right">${currency(item.pricePerGallon)} / gal</td>
        <td style="text-align:right">${currency(item.total)}</td>
      </tr>`).join('');

    return `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Pricing Quote ${escapeHtml(quote.id)}</title>
<style>
body{font-family:Arial,sans-serif;color:#1f2937;margin:0;padding:24px;background:#fff}
.topbar{height:14px;background:linear-gradient(90deg,#0e5ab7,#2e8ae6);margin:-24px -24px 24px}
.brand{display:flex;justify-content:space-between;gap:24px;align-items:flex-start}
.brand h1{color:#0e5ab7;margin:6px 0 0;font-size:32px}.sub{font-size:12px;text-transform:uppercase;color:#496280;font-weight:700;letter-spacing:.08em}
.badge{border:2px solid #dfeeff;background:#f7fbff;color:#0e5ab7;border-radius:14px;padding:10px 14px;font-weight:800;text-transform:uppercase}
.grid{display:grid;grid-template-columns:1.3fr .9fr;gap:24px;margin:24px 0}
.meta{border:1px solid #c9d9ef;border-radius:14px;overflow:hidden;background:#fbfdff}
.meta-row{display:grid;grid-template-columns:140px 1fr}.meta-row+.meta-row{border-top:1px solid #dbe7f5}
.meta-label{background:#edf5ff;color:#0f2544;font-weight:800;padding:11px 12px;font-size:13px}.meta-value{padding:11px 12px;font-size:13px}
.bill{display:grid;grid-template-columns:140px 1fr;border:1px solid #d7e4f4;border-radius:14px;overflow:hidden;margin-bottom:22px}
.bill .left{background:#edf5ff;padding:16px 14px;color:#0f2544;font-weight:800;line-height:2.1}.bill .right{padding:16px 14px;line-height:2.1}
.table-wrap{border:1px solid #d6e3f2;border-radius:14px;overflow:hidden}table{width:100%;border-collapse:collapse;font-size:13px}thead th{background:linear-gradient(180deg,#0e5ab7,#0b4e9f);color:white;padding:12px 10px;border:none;font-size:12px;text-transform:uppercase}tbody td{padding:11px 10px;border-bottom:1px solid #e3edf9}tbody tr:nth-child(even) td{background:#f8fbff}.summary{display:flex;justify-content:flex-end;margin-top:18px}.summary-box{width:360px;border:1px solid #d5e2f1;border-radius:14px;overflow:hidden;background:#fbfdff}.summary-row{display:grid;grid-template-columns:1fr 150px}.summary-row+.summary-row{border-top:1px solid #e0e9f4}.summary-row div{padding:11px 14px}.total{background:#edf5ff;font-weight:900}.notes{margin-top:18px;border:1px solid #d5e2f1;border-radius:14px;padding:14px;background:#fbfdff}.terms{margin-top:30px;border-top:3px solid #0e5ab7;padding-top:14px;color:#41556d;font-size:12px;line-height:1.7}
@media print {@page{size:letter;margin:.35in} body{padding:0}}
</style></head>
<body>
  <div class="topbar"></div>
  <div class="brand"><div><div class="sub">Official customer pricing quote</div><h1>Pricing Quote</h1></div><div class="badge">Encore Petroleum</div></div>
  <div class="grid">
    <div>
      <div style="color:#0e5ab7;font-weight:900;font-size:14px;text-transform:uppercase;margin-bottom:10px">Product Supplied By</div>
      <div style="font-size:14px;line-height:1.55">
        <strong>${escapeHtml(COMPANY.name.toUpperCase())}, LLC</strong><br>
        180 W 5th Street<br>Bayonne, NJ 07002<br>
        Phone: ${escapeHtml(COMPANY.phone)}<br>
        Office Email: ${escapeHtml(COMPANY.email)}<br><br>
        Sales Contact: ${escapeHtml(COMPANY.rep.name)} | ${escapeHtml(COMPANY.rep.title)}<br>
        Direct: ${escapeHtml(COMPANY.rep.phone)}<br>
        Email: ${escapeHtml(COMPANY.rep.email)}
      </div>
    </div>
    <div class="meta">
      <div class="meta-row"><div class="meta-label">Quote #</div><div class="meta-value">${escapeHtml(quote.id)}</div></div>
      <div class="meta-row"><div class="meta-label">Quote Date</div><div class="meta-value">${escapeHtml(formatDateTime(quote.createdAt))}</div></div>
      <div class="meta-row"><div class="meta-label">Valid Through</div><div class="meta-value">${escapeHtml(nextDayDate(quote.createdAt))}</div></div>
      <div class="meta-row"><div class="meta-label">Delivery Date</div><div class="meta-value">To Be Scheduled</div></div>
    </div>
  </div>
  <div class="bill"><div class="left">Company<br>Contact Name<br>Address<br>Contact Info</div><div class="right">${escapeHtml(contact.name || '')}<br>${escapeHtml(quote.customerContactName || contact.contactPerson || '')}<br>${escapeHtml(contact.address || '')}<br>${escapeHtml((contact.phone || '') + (contact.email ? ' | ' + contact.email : ''))}</div></div>
  ${quote.deliveryNotes ? `<div class="notes"><strong>Delivery Notes:</strong><br>${escapeHtml(quote.deliveryNotes)}</div>` : ''}
  <div style="color:#0e5ab7;font-weight:900;font-size:14px;text-transform:uppercase;margin:18px 0 10px">Products and Pricing</div>
  <div class="table-wrap"><table><thead><tr><th>#</th><th>Description</th><th>Pack</th><th style="text-align:right">Qty/Gal</th><th style="text-align:right">Unit Price</th><th style="text-align:right">Line Total</th></tr></thead><tbody>${rows}</tbody></table></div>
  <div class="summary"><div class="summary-box"><div class="summary-row"><div>Products Subtotal</div><div style="text-align:right">${currency(f.itemsSubtotal)}</div></div><div class="summary-row"><div>Delivery Fee</div><div style="text-align:right">${currency(f.deliveryFee)}</div></div><div class="summary-row"><div>Keg Deposit</div><div style="text-align:right">${currency(f.kegDepositTotal)}</div></div><div class="summary-row total"><div>Estimated Total</div><div style="text-align:right">${currency(f.total)}</div></div></div></div>
  <div class="terms">This quote expires on ${escapeHtml(nextDayDate(quote.createdAt))} unless extended in writing. A ${currency(FEES.kegDeposit)} keg deposit applies per keg when applicable. A ${currency(FEES.deliveryFee)} delivery fee applies to the order unless otherwise waived in writing.</div>
</body></html>`;
  }

  function openMail(to, subject, body) {
    const gmailUrl = 'https://mail.google.com/mail/?view=cm&fs=1&to=' + encodeURIComponent(to) + '&su=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
    const win = window.open(gmailUrl, '_blank', 'noopener,noreferrer');
    if (!win) {
      window.location.href = 'mailto:' + to + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
    }
  }

  function openSms(phone, body) {
    const clean = String(phone || '').replace(/[^\d+]/g, '');
    const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const sep = isiOS ? '&' : '?';
    window.location.href = 'sms:' + clean + (body ? (sep + 'body=' + encodeURIComponent(body)) : '');
  }

  async function copyText(text) {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      alert('Copied.');
    } catch (e) {
      alert('Copy failed.');
    }
  }

  window.EncoreApp = {
    switchTab,
    addContact: function () {
      const id = document.getElementById('contact-id').value.trim();
      const name = document.getElementById('contact-name').value.trim();
      const contactPerson = document.getElementById('contact-person').value.trim();
      const phone = document.getElementById('contact-phone').value.trim();
      const email = document.getElementById('contact-email').value.trim();
      const address = document.getElementById('contact-address').value.trim();
      if (!name) return alert('Enter a business name.');
      if (id) {
        const existing = state.contacts.find(c => c.id === id);
        if (existing) Object.assign(existing, { name, contactPerson, phone, email, address });
      } else {
        state.contacts.unshift({ id: uid(), name, contactPerson, phone, email, address });
      }
      save();
      render();
    },
    editContact: function (id) {
      const c = state.contacts.find(x => x.id === id);
      if (!c) return;
      switchTab('contacts');
      setTimeout(() => {
        document.getElementById('contact-id').value = c.id;
        document.getElementById('contact-name').value = c.name || '';
        document.getElementById('contact-person').value = c.contactPerson || '';
        document.getElementById('contact-phone').value = c.phone || '';
        document.getElementById('contact-email').value = c.email || '';
        document.getElementById('contact-address').value = c.address || '';
      }, 0);
    },
    resetContactForm: function () {
      switchTab('contacts');
    },
    deleteContact: function (id) {
      if (!confirm('Delete this contact?')) return;
      state.contacts = state.contacts.filter(c => c.id !== id);
      save();
      render();
    },
    useContactForQuote: function (id) {
      state.draftContactId = id;
      state.quoteBuilder.contactId = id;
      const contact = state.contacts.find(c => c.id === id);
      if (contact && !state.quoteBuilder.customerContactName) state.quoteBuilder.customerContactName = contact.contactPerson || '';
      switchTab('quote');
    },
    syncContactOnQuote: function () {
      const contactId = document.getElementById('quote-contact').value;
      state.quoteBuilder.contactId = contactId;
      const contact = state.contacts.find(c => c.id === contactId);
      if (contact) document.getElementById('quote-customer-contact').value = contact.contactPerson || '';
    },
    addQuoteItem: function () {
      const product = document.getElementById('quote-product').value;
      const containerId = document.getElementById('quote-container').value;
      const quantity = Number(document.getElementById('quote-quantity').value);
      const pricePerGallon = Number(document.getElementById('quote-price').value);
      const contactId = document.getElementById('quote-contact').value;
      const container = CONTAINERS.find(c => c.id === containerId);
      if (!product || !quantity || !pricePerGallon) return alert('Enter product, quantity, and price per gallon.');
      state.quoteBuilder.contactId = contactId;
      state.quoteBuilder.product = product;
      state.quoteBuilder.containerId = containerId;
      state.quoteBuilder.quantity = String(quantity);
      state.quoteBuilder.pricePerGallon = String(pricePerGallon);
      const totalGallons = quantity * container.gallons;
      const total = Number(totalGallons * pricePerGallon).toFixed(2);
      state.quoteBuilder.items.unshift({
        id: uid(),
        product,
        containerId,
        quantity,
        pricePerGallon: Number(pricePerGallon).toFixed(2),
        totalGallons,
        total
      });
      render();
    },
    removeQuoteItem: function (id) {
      state.quoteBuilder.items = state.quoteBuilder.items.filter(i => i.id !== id);
      render();
    },
    saveQuote: function () {
      const contactId = document.getElementById('quote-contact').value;
      const customerContactName = document.getElementById('quote-customer-contact').value.trim();
      const deliveryNotes = document.getElementById('quote-delivery-notes').value.trim();
      const includeDeliveryFee = document.getElementById('quote-delivery-fee').checked;
      const kegDepositCount = String(Math.max(0, Number(document.getElementById('quote-keg-count').value || 0)));
      state.quoteBuilder.contactId = contactId;
      state.quoteBuilder.customerContactName = customerContactName;
      state.quoteBuilder.deliveryNotes = deliveryNotes;
      state.quoteBuilder.includeDeliveryFee = includeDeliveryFee;
      state.quoteBuilder.kegDepositCount = kegDepositCount;
      if (!contactId) return alert('Select a customer.');
      if (!state.quoteBuilder.items.length) return alert('Add at least one line item.');
      const payload = {
        id: state.quoteBuilder.editingQuoteId || quoteId(),
        contactId,
        customerContactName,
        deliveryNotes,
        includeDeliveryFee,
        kegDepositCount,
        items: state.quoteBuilder.items.slice(),
        createdAt: state.quoteBuilder.editingQuoteId ? ((state.quotes.find(q => q.id === state.quoteBuilder.editingQuoteId) || {}).createdAt || Date.now()) : Date.now()
      };
      const f = quoteFinancials(payload);
      payload.itemsSubtotal = f.itemsSubtotal.toFixed(2);
      payload.total = f.total.toFixed(2);
      if (state.quoteBuilder.editingQuoteId) {
        state.quotes = state.quotes.map(q => q.id === payload.id ? payload : q);
      } else {
        state.quotes.unshift(payload);
      }
      state.selectedQuoteId = payload.id;
      this.resetQuoteBuilder();
      save();
      switchTab('dispatch');
    },
    editQuote: function (id) {
      const quote = state.quotes.find(q => q.id === id);
      if (!quote) return;
      state.quoteBuilder = {
        editingQuoteId: quote.id,
        contactId: quote.contactId || '',
        customerContactName: quote.customerContactName || '',
        deliveryNotes: quote.deliveryNotes || '',
        includeDeliveryFee: quote.includeDeliveryFee !== false,
        kegDepositCount: String(quote.kegDepositCount || '0'),
        product: state.products[0] || '',
        containerId: 'drum',
        quantity: '1',
        pricePerGallon: '',
        items: (quote.items || []).map(i => ({ ...i }))
      };
      state.draftContactId = quote.contactId || '';
      switchTab('quote');
    },
    resetQuoteBuilder: function () {
      state.quoteBuilder = {
        editingQuoteId: '',
        contactId: '',
        customerContactName: '',
        deliveryNotes: '',
        includeDeliveryFee: true,
        kegDepositCount: '0',
        product: state.products[0] || '',
        containerId: 'drum',
        quantity: '1',
        pricePerGallon: '',
        items: []
      };
      state.draftContactId = '';
      render();
    },
    openDispatch: function (id) {
      state.selectedQuoteId = id;
      switchTab('dispatch');
    },
    deleteQuote: function (id) {
      if (!confirm('Delete this quote?')) return;
      state.quotes = state.quotes.filter(q => q.id !== id);
      if (state.selectedQuoteId === id) state.selectedQuoteId = '';
      save();
      render();
    },
    printQuote: function (id) {
      const quote = state.quotes.find(q => q.id === id) || currentQuote();
      const contact = currentContactForQuote(quote);
      if (!quote || !contact) return alert('Quote not found.');
      const html = buildQuoteHtml(quote, contact);
      const w = window.open('', '_blank');
      if (!w) return alert('Pop-up blocked.');
      w.document.open();
      w.document.write(html);
      w.document.close();
      setTimeout(() => w.print(), 300);
    },
    emailCustomer: function (id) {
      const quote = state.quotes.find(q => q.id === id) || currentQuote();
      const contact = currentContactForQuote(quote);
      if (!quote || !contact) return alert('Quote not found.');
      const subject = `Encore Petroleum Quote ${quote.id}`;
      const body = [
        `Hello ${contact.name},`, '',
        `Attached is your official Encore Petroleum quote ${quote.id}.`,
        `Quote valid through ${nextDayDate(quote.createdAt)}.`, '',
        `If you need any revisions, reply to this email or call ${COMPANY.rep.phone}.`, '',
        `${COMPANY.rep.name}`,
        `${COMPANY.rep.title}`,
        `${COMPANY.rep.phone}`,
        `${COMPANY.rep.email}`
      ].join('\n');
      openMail(contact.email || '', subject, body);
    },
    emailFulfillment: function (id) {
      const quote = state.quotes.find(q => q.id === id) || currentQuote();
      const contact = currentContactForQuote(quote);
      if (!quote || !contact) return alert('Quote not found.');
      const lines = quote.items.map(i => `- ${i.product} | ${containerLabel(i.containerId)} x ${i.quantity} | ${i.totalGallons} gal | ${currency(i.total)}`).join('\n');
      const subject = `Fulfillment Quote ${quote.id} - ${contact.name}`;
      const body = [
        `Official quote package for ${contact.name}.`, '',
        `Quote ID: ${quote.id}`,
        `Valid through: ${nextDayDate(quote.createdAt)}`,
        `Customer phone: ${contact.phone || 'N/A'}`,
        `Customer email: ${contact.email || 'N/A'}`,
        `Address: ${contact.address || 'N/A'}`, '',
        `Line items:`, lines, '',
        `Estimated total: ${currency(quote.total)}`, '',
        `Attach the printed PDF when sending.`, '',
        `Submitted by ${COMPANY.rep.name}`
      ].join('\n');
      openMail(FULFILLMENT.emails.join(','), subject, body);
    },
    emailBoth: function (id) {
      this.printQuote(id);
      const quote = state.quotes.find(q => q.id === id) || currentQuote();
      const contact = currentContactForQuote(quote);
      if (!quote || !contact) return;
      setTimeout(() => this.emailFulfillment(id), 300);
      if (contact.email) setTimeout(() => this.emailCustomer(id), 700);
    },
    smsCustomer: function (id) {
      const quote = state.quotes.find(q => q.id === id) || currentQuote();
      const contact = currentContactForQuote(quote);
      if (!quote || !contact) return alert('Quote not found.');
      const f = quoteFinancials(quote);
      const body = `Encore Petroleum quote ${quote.id} is ready. Valid through ${nextDayDate(quote.createdAt)}. Delivery fee ${currency(f.deliveryFee)}. Keg deposit ${currency(FEES.kegDeposit)} per keg when applicable. Call ${COMPANY.rep.phone} with any revisions.`;
      openSms(contact.phone || '', body);
    },
    copyText,
    addProduct: function () {
      const input = document.getElementById('new-product');
      const value = input.value.trim();
      if (!value) return alert('Enter a product name.');
      if (state.products.some(p => p.toLowerCase() === value.toLowerCase())) return alert('That product already exists.');
      state.products.push(value);
      save();
      render();
    },
    removeProduct: function (name) {
      if (!confirm('Remove ' + name + '?')) return;
      state.products = state.products.filter(p => p !== name);
      if (!state.products.length) state.products = DEFAULT_PRODUCTS.slice();
      save();
      render();
    },
    resetProducts: function () {
      if (!confirm('Reset your product list back to the default Encore list?')) return;
      state.products = DEFAULT_PRODUCTS.slice();
      save();
      render();
    }
  };

  document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', function () {
    switchTab(btn.dataset.tab);
  }));

  render();
})();
</script>
</body>
</html>
